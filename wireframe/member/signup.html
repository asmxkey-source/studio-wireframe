<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>M-01 회원 가입</title>
<link rel="stylesheet" href="../css/wire.css">

<div class="phone">
  <div class="topbar">
    <a class="back" href="../index.html">←</a>
    <div class="title">회원 가입</div>
    <div class="spacer"></div>
  </div>

  <div class="content">
    <div class="note">강사에게 받은 초대 링크로 들어왔습니다. 아래 정보를 입력하면 가입이 완료됩니다. (4개 항목 모두 필수)</div>

    <div class="field">
      <label><span class="req">*</span> 이름</label>
      <div class="input">이하늘</div>
      <div class="hint">강사가 등록한 이름 — 확인 후 수정 가능</div>
    </div>
    <div class="field">
      <label><span class="req">*</span> 생년월일 앞 6자리</label>
      <div class="input">950412</div>
    </div>
    <div class="field">
      <label><span class="req">*</span> 주소</label>
      <div class="input">서울시 마포구 ○○로 12</div>
    </div>
    <div class="field">
      <label><span class="req">*</span> 휴대폰 번호</label>
      <div class="input">010-1234-5678</div>
    </div>

    <div class="card" style="padding:10px">
      <div class="note" style="margin:0">
        ☑ [필수] 개인정보 수집·이용 동의<br>
        ☑ [필수] 서비스 이용약관 동의<br>
        ☑ [선택] SMS 수신 동의 (수강료 납부 안내용)
      </div>
    </div>

    <div class="card" style="padding:10px;border:2px solid #333">
      <div class="note" style="margin:0">
        🔔 <b>알림을 켜주세요</b><br>
        수강권 만료·잔여 안내, 수업 변경, 납부 안내는 <b>앱 알림(푸시)</b>으로 전달됩니다. 알림을 꺼두면 중요한 안내를 놓칠 수 있어요.
      </div>
    </div>

    <a class="btn" href="reserve.html">가입 완료 + 알림 켜기</a>
  </div>
</div>

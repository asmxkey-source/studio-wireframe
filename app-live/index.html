<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>스튜디오 관리 앱 (실시간)</title>
<link rel="stylesheet" href="../wireframe/css/wire.css">
<style>
  body { background:#e8e8e8; }
  .rolebar { max-width:375px; margin:0 auto; display:flex; gap:6px; padding:8px; background:#333; align-items:center; }
  .rolebar a { flex:1; text-align:center; padding:8px; border-radius:6px; text-decoration:none; font-size:13px; font-weight:700; color:#ccc; background:#444; }
  .rolebar a.on { background:#fff; color:#111; }
  input.input, select.input, textarea.input { -webkit-appearance:none; appearance:none; background:#fff; font-size:16px; font-family:inherit; }
  .toast { position:fixed; left:50%; bottom:80px; transform:translateX(-50%); background:#111; color:#fff; padding:10px 16px; border-radius:20px; font-size:13px; z-index:99; opacity:0; transition:opacity .2s; max-width:340px; text-align:center; }
  .toast.show { opacity:1; }
  .chip { display:inline-block; font-size:12px; border:1px solid #888; border-radius:14px; padding:5px 10px; margin:2px 2px 2px 0; cursor:pointer; background:#fff; }
  .chip.on { background:#666; color:#fff; border-color:#666; }
  .btn, .chip, .seg a, .tab, .list-item, .classblock, .day { cursor:pointer; }
  .list-item .num { font-size:11px; color:#aaa; margin-right:4px; vertical-align:middle; position:relative; top:-2px; }
  .day.sel { border:2px solid #555; background:#f0f0f0; }
  .day.sel .num { font-weight:800; }
  .prog { height:14px; border:1px solid #999; border-radius:7px; overflow:hidden; background:#eee; }
  .prog > div { height:100%; background:#888; }
  .empty { border:2px dashed #bbb; border-radius:8px; padding:28px 12px; text-align:center; color:#888; font-size:13px; background:#fcfcfc; }
  #bookScope { display:flex; }
  #bookScope a { display:flex; align-items:center; justify-content:center; padding:10px 4px; line-height:1.3; min-height:40px; }
  .seg.vertical { display:block; border:none; overflow:visible; }
  .seg.vertical a { display:block; text-align:left; border:1px solid #ccc; border-radius:8px; padding:10px 12px; margin-bottom:6px; background:#fff; position:relative; padding-left:34px; }
  .seg.vertical a b { display:block; font-size:13px; }
  .seg.vertical a .sub { display:block; font-size:11px; color:#888; font-weight:400; margin-top:2px; }
  .seg.vertical a::before { content:''; position:absolute; left:10px; top:12px; width:16px; height:16px; border:2px solid #999; border-radius:50%; }
  .seg.vertical a.on { border-color:#555; background:#f7f7f7; }
  .seg.vertical a.on b { color:#222; }
  .seg.vertical a.on::before { border-color:#555; background:#555; box-shadow: inset 0 0 0 3px #f7f7f7; }
  .chip.wd { min-width:30px; text-align:center; }
  table.cal { width:100%; border-collapse:collapse; table-layout:fixed; margin:8px 0; }
  table.cal th { font-size:11px; color:#777; padding:4px 0; font-weight:400; }
  table.cal td { border:1px solid #e2e2e2; height:42px; vertical-align:top; font-size:11px; padding:3px 4px; color:#444; cursor:pointer; }
  table.cal td.dim { color:#ccc; background:#fafafa; cursor:default; }
  table.cal td.today { border:2px solid #222; font-weight:800; }
  table.cal td.sel { background:#dcdcdc; }
  table.cal td.blocked { background:repeating-linear-gradient(45deg,#f2f2f2,#f2f2f2 5px,#e0e0e0 5px,#e0e0e0 10px); }
  .hatch { background:repeating-linear-gradient(45deg,#eee,#eee 6px,#ddd 6px,#ddd 12px); border:1px dashed #999; border-radius:6px; padding:8px 10px; font-size:12px; color:#444; margin-bottom:8px; }
  .codebox { font-size:20px; font-weight:800; letter-spacing:3px; text-align:center; background:#f0f0f0; border:1px solid #bbb; border-radius:8px; padding:12px; margin:8px 0; }
  .banner { background:#fffbe6; border:1px solid #e0d48a; border-radius:8px; padding:10px; font-size:12px; margin-bottom:10px; }

  /* ===== PINTEL 브랜드 색상 (폰트 제외) =====
     원색 PRIMARY(0037B8)가 화면에서 쨍해 같은 계열의 차분한 톤으로 조정 (가이드의 명도·채도 변형 허용 범위)
     톤 조절은 아래 --pt-blue 한 줄만 바꾸면 전체 적용 */
  :root { --pt-blue:#3A5BA6; --pt-blue-bg:#EFF3FA; --pt-blue-bd:#C5D0E8; }
  body { background:#eef1f6; color:#373737; }
  .topbar { background:var(--pt-blue); border-bottom:none; }
  .topbar .title { color:#fff; }
  .topbar .back { color:#fff; }
  .tabbar { background:#fff; border-top:1px solid #dfe5f0; }
  .tab { color:#696969; }
  .tab .ico { border-color:#B8B8B8; background:#fff; }
  .tab.active { color:var(--pt-blue); }
  .tab.active .ico { background:var(--pt-blue); border-color:var(--pt-blue); }
  .btn { background:var(--pt-blue); border-color:var(--pt-blue); color:#fff; }
  .btn.ghost { background:#fff; border-color:#B8B8B8; color:#373737; }
  .card { background:#fff; border-color:#dfe5f0; }
  .tag { background:var(--pt-blue-bg); border-color:var(--pt-blue-bd); color:var(--pt-blue); }
  .tag.dark { background:var(--pt-blue); border-color:var(--pt-blue); color:#fff; }
  .tag.warn { background:#EB5127; border-color:#EB5127; color:#fff; }
  /* 회원 상태 3색 체계: 파랑=정상 / 초록=돈 관련 조치 / 회색=비활성 (채움=강, 테두리=약) */
  .tag.st-active { background:var(--pt-blue); border-color:var(--pt-blue); color:#fff; }
  .tag.st-pending { background:var(--pt-blue-bg); border-color:var(--pt-blue-bd); color:var(--pt-blue); }
  .tag.st-unpaid { background:#2F8A55; border-color:#2F8A55; color:#fff; }
  .tag.st-expiring { background:#E9F5EE; border-color:#9FCDB2; color:#2F8A55; }
  .tag.st-expired { background:#B8B8B8; border-color:#B8B8B8; color:#fff; }
  .tag.st-none { background:#f4f4f4; border-color:#c9c9c9; color:#696969; }
  .chip.st-active, .chip.st-pending, .chip.st-unpaid, .chip.st-expiring, .chip.st-expired, .chip.st-none { border-width:1px; }
  .chip.fsel { box-shadow:0 0 0 2px #373737; font-weight:700; }
  .badge { background:#EB5127; color:#fff; }
  .section-title { color:#373737; }
  .note, .hint, .list-item .sub { color:#696969; }
  .list-item { border-bottom-color:#e7ebf3; }
  .seg { border-color:#B8B8B8; }
  .seg a { color:#696969; }
  .seg a.on { background:var(--pt-blue); color:#fff; }
  .seg.vertical a.on { border-color:var(--pt-blue); background:var(--pt-blue-bg); }
  .seg.vertical a.on b { color:var(--pt-blue); }
  .seg.vertical a.on::before { border-color:var(--pt-blue); background:var(--pt-blue); box-shadow:inset 0 0 0 3px var(--pt-blue-bg); }
  .chip.on { background:var(--pt-blue); border-color:var(--pt-blue); color:#fff; }
  .day { color:#696969; }
  .day.today { border-color:var(--pt-blue); background:var(--pt-blue-bg); }
  .day.sel { border:2px solid var(--pt-blue); background:var(--pt-blue); color:#fff; }
  .day.sel .num { color:#fff; }
  table.cal td.today { border-color:var(--pt-blue); }
  table.cal td.sel { background:var(--pt-blue); color:#fff; }
  .classblock { border-color:#dfe5f0; border-left:5px solid var(--pt-blue); }
  .classblock.personal { border-left:5px solid #2A4784; background:#f6f8fd; }
  .classblock.mine { border:2px solid var(--pt-blue); }
  .classblock .t, .classblock .meta { color:#696969; }
  .prog { border-color:var(--pt-blue-bd); background:var(--pt-blue-bg); }
  .prog > div { background:var(--pt-blue); }
  .input { border-color:#B8B8B8; color:#373737; }
  .field label { color:#373737; }
  .switch { background:var(--pt-blue); }
  .switch.off { background:#ccc; }
  .empty { color:#696969; border-color:#c9d2e4; background:#fbfcfe; }
  .banner { background:var(--pt-blue-bg); border-color:var(--pt-blue-bd); }
  .codebox { background:var(--pt-blue-bg); border-color:var(--pt-blue-bd); color:var(--pt-blue); }
  .toast { background:var(--pt-blue); }
</style>
</head>
<body>
<div id="app"><div class="phone"><div class="content"><div class="empty">연결 중…</div></div></div></div>
<div id="devbar" style="display:none;max-width:375px;margin:0 auto;background:#333;padding:6px;gap:6px;justify-content:center;font-size:11px">
  <a id="sw-tr" style="color:#ccc;text-decoration:none;padding:4px 8px;background:#444;border-radius:5px;margin:0 3px">강사 화면</a>
  <a id="sw-mb" style="color:#ccc;text-decoration:none;padding:4px 8px;background:#444;border-radius:5px;margin:0 3px">회원 화면</a>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

// ===== Firebase config (공개용 식별자) =====
const firebaseConfig = {
  apiKey: "AIzaSyBbQHt5FksViMfgKeo3WwrKqlz7T1NSii8",
  authDomain: "studio-app-81e52.firebaseapp.com",
  projectId: "studio-app-81e52",
  storageBucket: "studio-app-81e52.firebasestorage.app",
  messagingSenderId: "452986965756",
  appId: "1:452986965756:web:d6c663811bde36cde8d179"
};
const fbApp = initializeApp(firebaseConfig);
const fdb = getFirestore(fbApp);

// ===== 스튜디오 코드: 강사·회원이 같은 데이터를 공유하는 열쇠 =====
// URL ?s=CODE 로 참여. 없으면 강사가 새로 만들거나 저장된 코드 사용.
function studioCode(){
  const u=new URLSearchParams(location.search);
  let c=u.get('s')||localStorage.getItem('studioCode');
  if(c){ localStorage.setItem('studioCode',c); }
  return c;
}
function newCode(){ // 6자리 코드
  const s='ABCDEFGHJKMNPQRSTUVWXYZ23456789'; let c=''; for(let i=0;i<6;i++) c+=s[Math.floor(Math.random()*s.length)]; return c;
}
let CODE=studioCode();

const empty=()=>({members:[],passes:[],classes:[],mpasses:[],reservations:[],attendance:[],payments:[],blocks:[]});
let DB=empty();
let ready=false;
// 오늘 날짜 = 기기의 실제 날짜 (하드코딩 금지)
const _now=new Date();
const todayStr=_now.getFullYear()+'-'+String(_now.getMonth()+1).padStart(2,'0')+'-'+String(_now.getDate()).padStart(2,'0');
// 시간표 뷰 상태
let TT={ view: localStorage.getItem('ttView')||'week', ref:todayStr, sel:todayStr };
let MEMF={ st:'', q:'' }; // 회원 관리 필터 (상태 칩 / 이름 검색)
// 일괄 예약 선택 회원
let BULK=[];

const won=n=>Number(n||0).toLocaleString('ko-KR');
function uid(){ return Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36); }
function md(iso){ if(!iso) return ''; const p=iso.split('-'); return p[1].replace(/^0/,'')+'/'+p[2].replace(/^0/,''); }
// 날짜 계산은 UTC 기준으로 통일 (지역 시간대에 따른 하루 오차 방지)
function addMonths(iso,m){ const d=new Date(iso+'T00:00:00Z'); d.setUTCMonth(d.getUTCMonth()+Number(m)); return d.toISOString().slice(0,10); }
function addDays(iso,n){ const d=new Date(iso+'T00:00:00Z'); d.setUTCDate(d.getUTCDate()+Number(n)); return d.toISOString().slice(0,10); }
const WD=['일','월','화','수','목','금','토'];
function dow(iso){ return new Date(iso+'T00:00:00Z').getUTCDay(); } // 0=일 … 6=토
function weekStart(iso){ const d=new Date(iso+'T00:00:00Z'); const g=d.getUTCDay(); d.setUTCDate(d.getUTCDate()-g); return d.toISOString().slice(0,10); } // 일요일 시작
function monthKey(iso){ return iso.slice(0,7); }
function daysBetween(a,b){ return Math.round((new Date(b+'T00:00:00Z')-new Date(a+'T00:00:00Z'))/86400000); }
function dateLabel(iso){ return md(iso)+' ('+WD[dow(iso)]+')'; }
function inBlock(iso){ return (DB.blocks||[]).some(b=>iso>=b.start&&iso<=b.end); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ===== Firestore 동기화 =====
async function saveDB(){ if(!CODE) return; try{ await setDoc(doc(fdb,'studios',CODE), DB); }catch(e){ toast('저장 오류: '+e.code); } }
function subscribe(){
  if(!CODE) return;
  onSnapshot(doc(fdb,'studios',CODE), snap=>{
    if(snap.exists()){ DB=Object.assign(empty(),snap.data()); }
    ready=true; render();
  }, err=>{ document.getElementById('app').innerHTML=`<div class="phone"><div class="content"><div class="banner">Firestore 연결 오류: ${err.code}. 테스트 모드로 만들었는지 확인해주세요.</div></div></div>`; });
}
async function ensureStudio(){
  if(!CODE){ return; }
  const ref=doc(fdb,'studios',CODE); const s=await getDoc(ref);
  if(!s.exists()) await setDoc(ref, DB);
}

// ===== 상태 계산 =====
function memberPasses(mid){ return DB.mpasses.filter(p=>p.memberId===mid); }
function memberStatus(mid){
  const ps=memberPasses(mid).filter(p=>p.status!=='refunded');
  const active=ps.find(p=>p.status==='active'&&p.remaining>0&&p.expire>=todayStr);
  if(active){ const soon=active.remaining<=1||active.expire<=addDays(todayStr,7); return soon?'만료 예정':'수강 중'; }
  if(ps.some(p=>p.status==='pending')) return '시작 전';
  if(DB.payments.some(p=>p.memberId===mid&&p.status==='unpaid')) return '미납';
  if(ps.length) return '만료';
  return '미등록';
}
function stClass(st){ return {'수강 중':'st-active','시작 전':'st-pending','미납':'st-unpaid','만료 예정':'st-expiring','만료':'st-expired','미등록':'st-none'}[st]||''; }
function usablePass(mid,cat){ return memberPasses(mid).filter(p=>p.status==='active'&&p.remaining>0&&(!p.expire||p.expire>=todayStr)&&(p.scope==='all'||p.scopeCat===cat)).sort((a,b)=>a.expire<b.expire?-1:1)[0]; }
function pendingPass(mid,cat){ return memberPasses(mid).find(p=>p.status==='pending'&&(p.scope==='all'||p.scopeCat===cat)); }
// 수업이 수강권에 연결된 경우: 그 수강권만 사용 가능 (미연결 수업은 종전대로 카테고리 기준)
function classPass(mid,c){ if(!c.passId) return usablePass(mid,c.category); return memberPasses(mid).filter(p=>p.passId===c.passId&&p.status==='active'&&p.remaining>0&&(!p.expire||p.expire>=todayStr)).sort((a,b)=>a.expire<b.expire?-1:1)[0]; }
function classPendingPass(mid,c){ if(!c.passId) return pendingPass(mid,c.category); return memberPasses(mid).find(p=>p.passId===c.passId&&p.status==='pending'); }
function canUseClass(mid,c){ if(!c.passId) return true; return !!classPass(mid,c)||!!classPendingPass(mid,c)||DB.payments.some(p=>p.memberId===mid&&p.status==='unpaid'&&p.passId===c.passId); }

// ===== 라우팅 =====
function go(h){ location.hash=h; }
window.addEventListener('hashchange',render);

function render(){
  if(!ready){ return; }
  const h=location.hash||'#/home';
  const isMb=h.startsWith('#/m/');
  // 코드 없으면: 강사=코드 생성 화면 / 회원=코드 안내
  if(!CODE){ document.getElementById('app').innerHTML='<div class="phone">'+(isMb?vJoinNeeded():vCreateStudio())+'</div>'; wire(); return; }
  // 회원 역할은 강사 화면(환불·결제·회원 관리 등)에 접근 불가 — 주소 직접 입력도 차단
  if(localStorage.getItem('role')==='member'&&!isMb){ location.hash='#/m/reserve'; return; }
  const seg=h.replace('#/','').split('/')[0]; const arg=h.replace('#/','').split('/')[1];
  let html='';
  if(isMb){ const m=curMember(h); const mseg=h.replace('#/m/','').split('/')[0]; const marg=h.replace('#/m/','').split('/')[1]; html=(m&&!m.joined)?vJoinMember():(m?({reserve:mReserve,classdt:mClassReserve,pass:mPass,usage:mUsage,profile:mProfile}[mseg]||mReserve)(m,marg):vJoinMember()); }
  else { html=({home:vTimetable,passes:vPasses,passAdd:vPassAdd,passEdit:()=>vPassEdit(arg),members:vMembers,memberAdd:vMemberAdd,member:()=>vMemberDetail(arg),timetable:vTimetable,classAdd:vClassAdd,class:()=>vClassDetail(arg),classEdit:()=>vClassEdit(arg),attend:()=>vAttend(arg),payment:()=>vPayment(arg),refund:()=>vRefund(arg),tuition:vTuition,blockAdd:vBlockAdd,bookSelect:vBookSelect,bookFor:vBookFor}[seg]||vTimetable)(); }
  document.getElementById('app').innerHTML='<div class="phone">'+html+'</div>'; wire();
}

// ===== 공통 =====
function hdr(title,back){ return `<div class="topbar">${back?`<a class="back" href="${back}">←</a>`:'<div class="back"></div>'}<div class="title">${title}</div><div class="spacer"></div></div>`; }
function tabbar(a){ const t=[['timetable','시간표·예약'],['classAdd','수업 등록'],['members','회원'],['passes','수강권'],['tuition','수강료']]; return `<div class="tabbar">${t.map(([k,l])=>`<a class="tab ${a===k?'active':''}" href="#/${k}"><span class="ico"></span>${l}</a>`).join('')}</div>`; }
function mtab(a){ const t=[['reserve','수업 예약'],['pass','수강권'],['usage','이용내역'],['profile','내 정보']]; return `<div class="tabbar">${t.map(([k,l])=>`<a class="tab ${a===k?'active':''}" href="#/m/${k}"><span class="ico"></span>${l}</a>`).join('')}</div>`; }

// ===== 스튜디오 코드 화면 =====
function vCreateStudio(){
  return hdr('스튜디오 만들기')+`<div class="content">
    <div class="banner">처음이시면 스튜디오를 만드세요. 만들어진 <b>초대 링크</b>를 회원에게 카톡으로 보내면, 회원이 가입한 내용이 이 폰에 실시간으로 나타납니다.</div>
    <a class="btn" id="createStudio">＋ 내 스튜디오 만들기</a>
  </div>`;
}
function vJoinNeeded(){
  return hdr('회원')+`<div class="content"><div class="empty">강사에게 받은 <b>초대 링크</b>로 접속해주세요.<br><span style="font-size:11px">링크에 스튜디오 코드가 들어있습니다.</span></div></div>`;
}

// ===== 강사 화면 =====
function guideCards(){
  if(DB.passes.length&&DB.members.length&&DB.classes.length) return '';
  return `<div class="section-title">시작하기 <span class="sub" style="font-weight:400">· 스튜디오 ${CODE}</span></div>
    <a class="card" href="#/passes" style="display:block;text-decoration:none;color:#222"><b>① 수강권 만들기</b> ${DB.passes.length?'✓':''}</a>
    <a class="card" href="#/memberAdd" style="display:block;text-decoration:none;color:#222"><b>② 회원 등록 · 초대</b> ${DB.members.length?'✓':''}</a>
    <a class="card" href="#/classAdd" style="display:block;text-decoration:none;color:#222"><b>③ 수업 등록</b> ${DB.classes.length?'✓':''}</a>`;
}
function occRes(cid){ return DB.reservations.filter(r=>r.classId===cid&&(r.status==='booked'||r.status==='done')); }
function classBlock(c){ const rc=occRes(c.id).length; return `<a class="classblock ${c.category==='personal'?'personal':''}" href="#/class/${c.id}"><span class="t">${c.time}</span> <span class="tag ${c.category==='group'?'dark':''}">${c.category==='group'?'그룹':'개인'}</span><div class="n">${esc(c.name)}</div><div class="meta">예약 ${rc}/${c.capacity}${rc>=c.capacity?' · 마감':' · 잔여 '+(c.capacity-rc)}</div></a>`; }

}

  (DB.blocks||[]).filter(b=>b.end>=days[0]&&b.start<=days[6]).forEach(b=>{ html+=`<div class="hatch">🚫 ${dateLabel(b.start)} ~ ${dateLabel(b.end)} ${blockLabel}${b.reason?' · '+esc(b.reason):''}</div>`; });

  if(!withCls.length) return html+'<div class="empty">이번 주 등록된 수업이 없습니다</div>';
  withCls.forEach(dt=>{ const cls=DB.classes.filter(c=>c.date===dt).sort((a,b)=>a.time<b.time?-1:1); html+=`<div class="section-title">${dateLabel(dt)}${dt===todayStr?' · 오늘':''}</div>`+cls.map(blockFn).join(''); });
  return html;
}

function ttMonth(){
  const mk=monthKey(TT.ref); const [y,mo]=mk.split('-').map(Number);
  const firstDow=new Date(`${mk}-01T00:00:00Z`).getUTCDay();
  const dim=new Date(Date.UTC(y,mo,0)).getUTCDate();
  let cells=''; for(let i=0;i<firstDow;i++) cells+='<td class="dim"></td>';
  for(let d=1;d<=dim;d++){ const iso=`${mk}-${String(d).padStart(2,'0')}`; const has=DB.classes.some(c=>c.date===iso); const bl=inBlock(iso); const cl=[bl?'blocked':'',iso===todayStr?'today':'',iso===TT.sel?'sel':''].filter(Boolean).join(' '); cells+=`<td class="${cl}" data-day="${iso}">${d}${has?'<br>●':''}</td>`; if((firstDow+d)%7===0) cells+='</tr><tr>'; }
  const grid=`<table class="cal"><tr><th>일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th></tr><tr>${cells}</tr></table>`;
  const selCls=DB.classes.filter(c=>c.date===TT.sel).sort((a,b)=>a.time<b.time?-1:1);
  const sel=`<div class="section-title">${dateLabel(TT.sel)}${inBlock(TT.sel)?' · 예약 불가':''}</div>`+(selCls.length?selCls.map(classBlock).join(''):'<div class="empty">이 날 수업이 없습니다</div>');
  return `${grid}<div class="note" style="margin-top:-4px">● = 수업 있음 · 빗금 = 예약 불가 · 날짜 탭 → 아래에 표시</div>${sel}`;
}

function classListSection(){
  const groups=new Map();
  DB.classes.forEach(c=>{ const k=c.seriesId||('single-'+c.id); if(!groups.has(k)) groups.set(k,[]); groups.get(k).push(c); });
  const all=[...groups.values()].map(list=>{ list.sort((a,b)=>a.date<b.date?-1:1);
    const fut=list.filter(c=>c.date>=todayStr); const rep=fut[0]||list[list.length-1];
    const days=rep.seriesId?[...new Set(list.map(c=>WD[dow(c.date)]))].join('·'):null;
    return {rep,futCnt:fut.length,days,nextDate:fut[0]?fut[0].date:null};
  });
  const act=all.filter(r=>r.futCnt>0).sort((a,b)=>((a.nextDate||'')+(a.rep.time||''))<((b.nextDate||'')+(b.rep.time||''))?-1:1);
  const ended=all.filter(r=>!r.futCnt).sort((a,b)=>a.rep.date<b.rep.date?1:-1).slice(0,5);
  if(!act.length&&!ended.length) return '';
  const row=(r,i,opt)=>{ const lp=r.rep.passId?DB.passes.find(p=>p.id===r.rep.passId):null; const showLp=lp&&lp.name!==r.rep.name;
    const inner=`<span class="grow"><span class="num">${i+1}</span><span class="tag ${r.rep.category==='group'?'dark':''}">${r.rep.category==='group'?'그룹':'개인'}</span> ${esc(r.rep.name)}<br><span class="sub">${r.rep.seriesId?'매주 '+r.days:'단건 '+md(r.rep.date)} ${r.rep.time||''}${r.nextDate?' · 다음 회차 '+md(r.nextDate):''}${showLp?'<br>수강권: '+esc(lp.name):''}</span></span>`;
    if(opt.ended) return `<div class="list-item" style="opacity:.55${opt.last?';border-bottom:none':''}"><span style="display:contents;cursor:pointer" data-go="#/class/${r.rep.id}">${inner}<span class="tag warn">회차 소진</span></span><a data-del="${r.rep.id}" data-scope="${r.rep.seriesId?'all':'one'}" style="font-size:11px;color:#888;text-decoration:underline;flex-shrink:0">삭제</a></div>`;
    return `<a class="list-item" href="#/class/${r.rep.id}"${opt.last?' style="border-bottom:none"':''}>${inner}<span class="sub">남은 회차 ${r.futCnt}</span></a>`; };
  const line='<div style="border-top:2px solid #d3dbe9;margin:24px 0 0"></div>';
  let h=line;
  if(act.length) h+=`<div class="section-title">운영 중인 수업 ${act.length}</div><div class="hint" style="margin:-4px 0 6px">탭하면 다음 회차의 수업 상세로 이동</div>`+act.map((r,i)=>row(r,i,{last:i===act.length-1})).join('');
  if(ended.length) h+=line+`<div class="section-title" style="color:#696969">종료 수업 ${ended.length} (남은 회차 0)</div><div class="hint" style="margin:-4px 0 6px">앞으로 열릴 회차가 없는 수업${all.filter(r=>!r.futCnt).length>5?' · 최근 5개만 표시':''} — 계속 운영하려면 위에서 다시 등록하세요</div>`+ended.map((r,i)=>row(r,i,{ended:true,last:i===ended.length-1})).join('');
  return h;
}

function vTuition(){
  const unpaid=DB.payments.filter(p=>p.status==='unpaid');
  const paid=DB.payments.filter(p=>p.status==='paid').slice().sort((a,b)=>(b.date||'')<(a.date||'')?-1:1);
  const refunds=DB.payments.filter(p=>p.status==='refund').slice().sort((a,b)=>(b.date||'')<(a.date||'')?-1:1);
  const refSum=refunds.reduce((s,p)=>s+(+p.amount||0),0);
  const paidSum=paid.reduce((s,p)=>s+(+p.amount||0),0);
  const unpaidSum=unpaid.reduce((s,p)=>s+(+p.amount||0),0);
  const tot=paidSum+unpaidSum; const pct=tot?Math.round(paidSum/tot*100):0;
  const expM=DB.members.filter(m=>memberStatus(m.id)==='만료 예정');
  return hdr('수강료')+`<div class="content">
  <div class="card"><b>수강료 요약</b>
    <div class="note" style="margin:6px 0 4px">납부 <b>${won(paidSum)}원</b> (${paid.length}건) · 미납 <b>${won(unpaidSum)}원</b> (${unpaid.length}건)${refunds.length?` · 환불 <b>−${won(refSum)}원</b> (${refunds.length}건)`:''}</div>
    <div class="prog"><div style="width:${pct}%"></div></div>
    <div class="hint">막대 = 전체 중 납부 비율 ${pct}%</div>
  </div>
  <div style="border-top:2px solid #d3dbe9;margin:24px 0 0"></div>
  <div class="section-title">만료 예정 ${expM.length}</div>
  ${expM.length?expM.map((m,i)=>{const ap=memberPasses(m.id).find(p=>p.status==='active');return `<a class="list-item" href="#/member/${m.id}"><span class="thumb"></span><span class="grow"><span class="num">${i+1}</span>${esc(m.name)}<br><span class="sub">${ap?'잔여 '+ap.remaining+'회/총 '+ap.total+'회 · ~'+md(ap.expire):''}</span></span><span class="arrow">›</span></a>`;}).join(''):'<div class="hint" style="margin:0 0 8px">만료 예정 회원 없음</div>'}
  <div class="section-title">미납 ${unpaid.length}</div>
  ${unpaid.length?unpaid.map((p,i)=>{const m=DB.members.find(x=>x.id===p.memberId)||{};return `<a class="list-item" href="#/member/${p.memberId}"><span class="thumb"></span><span class="grow"><span class="num">${i+1}</span>${esc(m.name)}<br><span class="sub">${esc(p.passName)} (${won(p.amount)}원)<br>기한 ${md(p.date)}</span></span><span class="badge">결제</span></a>`;}).join(''):'<div class="empty">미납 없음</div>'}
  <div style="border-top:2px solid #d3dbe9;margin:24px 0 0"></div>
  ${refunds.length?`<div class="section-title">환불 ${refunds.length}</div>${refunds.map((p,i)=>{const m=DB.members.find(x=>x.id===p.memberId)||{};return `<div class="list-item"><span class="grow"><span class="num">${i+1}</span>${esc(m.name)} · ${esc(p.passName)} (<span style="color:#EB5127">−${won(p.amount)}원</span>)<br><span class="sub">환불 (${md(p.date)})</span></span><a data-delpay="${p.id}" style="font-size:11px;color:#888;text-decoration:underline">삭제</a></div>`;}).join('')}`:''}
  <div class="section-title">최근 납부 ${paid.length}</div>
  ${paid.length?paid.map((p,i)=>{const m=DB.members.find(x=>x.id===p.memberId)||{};return `<div class="list-item"><span class="grow"><span class="num">${i+1}</span>${esc(m.name)} · ${esc(p.passName)} (${won(p.amount)}원)<br><span class="sub">${p.method} (${md(p.date)})</span></span><a data-delpay="${p.id}" style="font-size:11px;color:#888;text-decoration:underline">삭제</a></div>`;}).join(''):'<div class="empty">없음</div>'}

function mtMonth(m){

  for(let d=1;d<=dim;d++){ const iso=`${mk}-${String(d).padStart(2,'0')}`; const has=DB.classes.some(c=>c.date===iso); const bl=inBlock(iso); const cl=[bl?'blocked':'',iso===todayStr?'today':'',iso===TT.sel?'sel':''].filter(Boolean).join(' '); cells+=`<td class="${cl}" data-day="${iso}">${d}${has?'<br>●':''}</td>`; if((firstDow+d)%7===0) cells+='</tr><tr>'; }

  return `${grid}<div class="note" style="margin-top:-4px">● = 수업 있음 · 빗금 = 휴무 · 날짜 탭 → 아래에 표시</div>${sel}`;

async function doBulkCancel(cid){
  const c=DB.classes.find(x=>x.id===cid); if(!c) return;
  const mids=[...document.querySelectorAll('.rchk')].filter(x=>x.checked).map(x=>x.dataset.mid);

  const scope=(document.getElementById('cancelScope')||{dataset:{v:'one'}}).dataset.v;
  let targets=[c];
  if(scope==='after'&&c.seriesId) targets=DB.classes.filter(x=>x.seriesId===c.seriesId&&x.date>=c.date);
  if(!confirm(`선택한 ${mids.length}명의 예약을 ${scope==='after'?'이후 모든 회차에서 ':''}취소할까요?`)) return;
  let n=0;
  targets.forEach(t=>mids.forEach(mid=>{ const r=DB.reservations.find(r=>r.classId===t.id&&r.memberId===mid&&r.status==='booked'); if(r){ r.status='cancelled'; n++; } }));
  if(!n){ toast('취소할 예약이 없습니다'); return; }
  await saveDB(); toast(`예약 ${n}건 취소 · 회원 알림(가정)`); render();
}
async function doBulkBookAll(cids){
  if(!Array.isArray(cids)) cids=[cids];
  if(!cids.length||!BULK.length) return;
  const scope=(document.getElementById('bookScope')||{dataset:{v:'one'}}).dataset.v;
  let targets=[];
  cids.forEach(cid=>{ const c=DB.classes.find(x=>x.id===cid); if(!c) return;
    if(scope==='after'&&c.seriesId) targets.push(...DB.classes.filter(x=>x.seriesId===c.seriesId&&x.date>=c.date));
    else targets.push(c);
  });
  targets=[...new Map(targets.map(t=>[t.id,t])).values()]; // 중복 제거
  let ok=0,full=0,dup=0,nopass=0;
  targets.forEach(t=>{ BULK.forEach(mid=>{
    if(!canUseClass(mid,t)){ nopass++; return; }
    if(occRes(t.id).find(r=>r.memberId===mid)){ dup++; return; }
    const rc=occRes(t.id).length;
    if(rc>=t.capacity){ full++; return; }
    DB.reservations.push({id:uid(),classId:t.id,memberId:mid,status:'booked'}); ok++;
  }); });
  if(!ok){ toast(full?'정원 마감으로 추가 불가':nopass?'수강권이 맞지 않아 추가된 예약이 없습니다':'이미 모두 예약되어 있습니다'); return; }
  await saveDB(); toast(`예약 ${ok}건 추가${full?` · 마감 ${full}건 제외`:''}${dup?` · 중복 ${dup}건 제외`:''}${nopass?` · 수강권 불일치 ${nopass}건 제외`:''}`);
  BULK=[]; go(cids.length===1?'#/class/'+cids[0]:'#/timetable');
}
async function doBulkAdd(f){
  const txt=(new FormData(f)).get('bulk')||''; const lines=txt.split(/\n/).map(s=>s.trim()).filter(Boolean);
  let n=0,bad=0;
  lines.forEach(l=>{ const parts=l.split(/[,\t]/).map(s=>s.trim()).filter(Boolean); const p2=parts.length>=2?parts:l.split(/\s+/).map(s=>s.trim()).filter(Boolean);
    if(p2.length>=2&&/\d{3,}/.test(p2[1])){ DB.members.push({id:uid(),name:p2[0],phone:p2.slice(1).join('-').replace(/--+/g,'-'),joined:false}); n++; } else bad++; });
  if(!n){ toast('형식을 확인하세요 — 한 줄에 "이름,전화번호"'); return; }
  await saveDB(); toast(`${n}명 일괄 등록 완료${bad?` (${bad}줄 형식 오류 제외)`:''}`); go('#/members');
}
async function doTrainerBook(cid){
  const sel=document.getElementById('bookSel'); if(!sel||!sel.value){ toast('회원을 선택하세요'); return; }
  const mid=sel.value; const c=DB.classes.find(x=>x.id===cid); if(!c) return;
  const scopeSeg=document.getElementById('bookScope'); const scope=scopeSeg?scopeSeg.dataset.v:'one';
  let targets=[c];
  if(scope==='after'&&c.seriesId) targets=DB.classes.filter(x=>x.seriesId===c.seriesId&&x.date>=c.date).sort((a,b)=>a.date<b.date?-1:1);
  let ok=0,full=0,dup=0;
  targets.forEach(t=>{
    if(!canUseClass(mid,t)) return;
    if(occRes(t.id).find(r=>r.memberId===mid)){ dup++; return; }
    const rc=occRes(t.id).length;
    if(rc>=t.capacity){ full++; return; }
    DB.reservations.push({id:uid(),classId:t.id,memberId:mid,status:'booked'}); ok++;
  });
  if(!ok){ toast(full?'정원 마감으로 추가 불가':'이미 모두 예약된 회원'); return; }
  await saveDB(); toast(`${ok}개 회차 예약 추가${full?` · 마감 ${full}건 제외`:''}${dup?` · 중복 ${dup}건 제외`:''} · 회원 알림(가정)`); render();
}

async function doDelProduct(id){ const p=DB.passes.find(x=>x.id===id); if(!p) return;
  const sold=DB.mpasses.filter(x=>x.passId===id).length;
  const linkedCls=DB.classes.filter(c=>c.passId===id);
  let msg=`'${p.name}' 수강권을 삭제할까요?`;
  if(sold) msg+=`\n· 이미 판매된 ${sold}건(회원 보유분)은 그대로 유지됩니다.`;
  if(!confirm(msg)) return;
  let clsMsg='';
  if(linkedCls.length){
    const rc=DB.reservations.filter(r=>linkedCls.some(c=>c.id===r.classId)&&r.status==='booked').length;
    if(confirm(`시간표에 이 강의로 등록된 수업 ${linkedCls.length}개가 있습니다.\n함께 삭제(폐강)할까요? ${rc?`(예약 ${rc}건도 취소됩니다)`:''}\n\n[확인] = 수업도 함께 삭제 · [취소] = 수업은 시간표에 유지`)){
      const ids=linkedCls.map(c=>c.id);
      DB.reservations.filter(r=>ids.includes(r.classId)&&r.status==='booked').forEach(r=>r.status='cancelled');
      DB.classes=DB.classes.filter(c=>!ids.includes(c.id));
      clsMsg=` · 수업 ${linkedCls.length}개 폐강`;
    }
  }
  DB.passes=DB.passes.filter(x=>x.id!==id);
  await saveDB(); toast('수강권 삭제됨'+clsMsg); render(); }
function copy(t){ navigator.clipboard?.writeText(t).then(()=>toast('복사됨 — 카톡에 붙여넣어 전송하세요'),()=>toast(t)); }
async function handleForm(hash,d){
  if(hash.startsWith('#/passAdd')){ const cat=document.getElementById('cat').dataset.v; const price=+String(d.price).replace(/[^0-9]/g,''); DB.passes.push({id:uid(),category:cat,scope:'all',scopeCat:cat==='group'?'그룹':'개인',name:d.name,count:+d.count,months:+d.months,price}); await saveDB(); toast('수강권 등록'); go('#/passes'); }
  else if(hash.startsWith('#/memberAdd')){ const id=uid(); DB.members.push({id,name:d.name,phone:d.phone,joined:false}); await saveDB(); toast('회원 등록 · 초대 링크 생성'); go('#/member/'+id); }
}
async function doClassAdd(f){
  const d=Object.fromEntries(new FormData(f)); const passId=document.getElementById('clsPass').value;
  const p=DB.passes.find(x=>x.id===passId); if(!p){ toast('강의(수강권)를 선택하세요'); return; }
  const category=p.category, linkPass=p.id, name=(d.cname||'').trim()||p.name;
  const cap=category==='personal'?1:+d.capacity;
  const repMode=(document.getElementById('rep')||{}).dataset?document.getElementById('rep').dataset.v:'none';
  if(repMode!=='weekly'){
    DB.classes.push({id:uid(),seriesId:null,category,name,date:d.date,time:d.time,capacity:cap,place:d.place,passId:linkPass});
    await saveDB(); toast(inBlock(d.date)?'수업 등록 (주의: 예약 불가 기간)':'수업 등록'); go('#/timetable'); return;
  }
  // 매주 반복 생성
  const wds=[...document.querySelectorAll('#wdays .chip.wd.on')].map(x=>+x.dataset.d);
  if(!wds.length){ toast('반복 요일을 하나 이상 선택하세요'); return; }
  const endMode=document.getElementById('endmode').dataset.v;
  const start=d.date; const seriesId=uid();
  let targetCount=Infinity, stopDate;
  if(endMode==='count'){ targetCount=Math.max(1,+document.getElementById('endCount').value||10); stopDate=addMonths(start,18); }
  else if(endMode==='until'){ stopDate=document.getElementById('endUntil').value; if(!stopDate||stopDate<start){ toast('종료일을 시작일 이후로 지정하세요'); return; } }
  else { stopDate=addMonths(start,3); } // 계속 = 3개월치 미리 생성
  const occ=[]; let cur=start, guard=0;
  while(occ.length<targetCount && cur<=stopDate && guard<800){ if(wds.includes(dow(cur)) && !inBlock(cur)) occ.push(cur); cur=addDays(cur,1); guard++; }
  if(!occ.length){ toast('생성할 회차가 없습니다. 조건을 확인하세요'); return; }
  occ.forEach(dt=>DB.classes.push({id:uid(),seriesId,category,name,date:dt,time:d.time,capacity:cap,place:d.place,passId:linkPass}));
  await saveDB(); toast(`반복 수업 ${occ.length}회 생성 (${md(occ[0])}~${md(occ[occ.length-1])})`); go('#/timetable');
}
async function doBlockAdd(f){
  const d=Object.fromEntries(new FormData(f)); if(d.end<d.start){ toast('종료일이 시작일보다 빠릅니다'); return; }
  const id=uid(); DB.blocks=DB.blocks||[]; DB.blocks.push({id,start:d.start,end:d.end,reason:d.reason||''});
  const bdays=daysBetween(d.start,d.end)+1;
  // 수강권 자동 연장 (기간 겹치는 사용 중 수강권)
  let ext=0; DB.mpasses.forEach(p=>{ if(p.status==='active'&&p.expire&&p.expire>=d.start){ p.expire=addDays(p.expire,bdays); ext++; } });
  // 이 기간의 수업 폐강 + 예약 취소
  const inRange=DB.classes.filter(c=>c.date>=d.start&&c.date<=d.end); const ids=inRange.map(c=>c.id);
  DB.reservations.filter(r=>ids.includes(r.classId)&&r.status==='booked').forEach(r=>r.status='cancelled');
  DB.classes=DB.classes.filter(c=>!ids.includes(c.id));
  await saveDB(); toast(`예약 불가 저장 · 수업 ${inRange.length}건 정리 · 수강권 ${ext}건 +${bdays}일 연장`); go('#/timetable');
}
async function doClassEdit(f){

}
async function doJoin(f){ const mid=f.dataset.mid; const d=Object.fromEntries(new FormData(f));
  if(mid==='new'){ const id=uid(); DB.members.push({id,name:d.name,phone:d.phone,birth:d.birth,joined:true}); localStorage.setItem('myMemberId',id); await saveDB(); toast('가입 완료! 강사 폰에도 반영됩니다.'); go('#/m/reserve'); return; }

async function doPayment(f){ const mid=f.dataset.mid; const d=Object.fromEntries(new FormData(f)); const method=document.getElementById('method').dataset.v; const startMode=document.getElementById('start').dataset.v; const pass=DB.passes.find(p=>p.id===d.passId); if(!pass) return; const unpaid=method==='미납';
  const paidDate=d.paidDate||todayStr;
  const pay={id:uid(),memberId:mid,passId:pass.id,passName:pass.name,method:unpaid?'-':method,amount:pass.price,date:paidDate,status:unpaid?'unpaid':'paid',mpId:null};
  if(!unpaid){
    const prevUn=DB.payments.find(x=>x.memberId===mid&&x.passId===pass.id&&x.status==='unpaid');
    // 미납 전환으로 수강권이 이미 있는 경우: 기록만 납부 처리, 수강권 중복 발급 안 함
    if(prevUn&&prevUn.mpId&&DB.mpasses.find(x=>x.id===prevUn.mpId)){
      prevUn.method=method; prevUn.amount=pass.price; prevUn.date=paidDate; prevUn.status='paid';
      await saveDB(); toast('미납 → 납부 처리 (기존 수강권 유지)'); go('#/member/'+mid); return;
    }
    const start=startMode==='date'?(d.startDate||todayStr):null; const mp={id:uid(),memberId:mid,passId:pass.id,name:pass.name,scope:pass.scope,scopeCat:pass.scopeCat,total:pass.count,remaining:pass.count,status:start?'active':'pending',start:start,expire:start?addMonths(start,pass.months):null,months:pass.months}; const pend=DB.attendance.filter(a=>a.memberId===mid&&a.pending&&!a.trial); if(pend.length){ mp.status='active'; mp.start=pend[0].date; mp.expire=addMonths(pend[0].date,pass.months); pend.forEach(a=>{ if(mp.remaining>0){mp.remaining--; a.deducted=true; a.pending=false;} }); } DB.mpasses.push(mp); pay.mpId=mp.id;
    if(prevUn){ prevUn.method=method; prevUn.amount=pass.price; prevUn.date=paidDate; prevUn.status='paid'; prevUn.mpId=mp.id; }
    else DB.payments.push(pay);
    await saveDB(); toast(pend.length?`납부 완료 · 출석 ${pend.length}건 소급 차감 → 잔여 ${mp.remaining}회`:prevUn?'미납 → 납부 처리 · 수강권 발급':'납부 완료 · 수강권 발급'); }
  else { DB.payments.push(pay); await saveDB(); toast('미납 등록'); }
  go('#/member/'+mid);
}
async function doRefund(f){ const mp=DB.mpasses.find(x=>x.id===f.dataset.mp); if(!mp) return;
  const d=Object.fromEntries(new FormData(f));
  const amt=+String(d.amount).replace(/[^0-9]/g,'');
  if(!confirm(`${won(amt)}원 환불을 확정할까요?\n수강권은 '환불됨' 처리되고 다가올 예약은 자동 취소됩니다.`)) return;
  mp.status='refunded';
  let cn=0; DB.reservations.forEach(r=>{ if(r.memberId===mp.memberId&&r.status==='booked'){ const c=DB.classes.find(x=>x.id===r.classId); if(c&&c.date>=todayStr){ r.status='cancelled'; cn++; } } });
  DB.payments.push({id:uid(),memberId:mp.memberId,passId:mp.passId,passName:mp.name,method:'환불',amount:amt,date:d.date||todayStr,status:'refund',mpId:null});
  await saveDB(); toast(`환불 처리 완료${cn?` · 예약 ${cn}건 취소`:''}`); go('#/member/'+mp.memberId); }
async function doDelAtt(id){ const a=DB.attendance.find(x=>x.id===id); if(!a) return;
  if(!confirm('이 출석 기록을 삭제할까요?'+(a.deducted?'\n차감됐던 1회가 복구되고, 해당 수업은 다시 출석 체크할 수 있는 상태로 돌아갑니다.':''))) return;
  if(a.deducted){ const mp=(a.mpId&&DB.mpasses.find(p=>p.id===a.mpId))||DB.mpasses.find(p=>p.memberId===a.memberId&&p.status==='active'); if(mp&&mp.status!=='refunded'&&mp.remaining<mp.total) mp.remaining++; }
  const r=DB.reservations.find(x=>x.classId===a.classId&&x.memberId===a.memberId&&x.status==='done'); if(r) r.status='booked';
  DB.attendance=DB.attendance.filter(x=>x.id!==id);
  await saveDB(); toast('출석 기록 삭제'+(a.deducted?' · 1회 복구':'')); render(); }
async function doDelPay(id){ const p=DB.payments.find(x=>x.id===id); if(!p) return;
  if(p.status==='paid'&&p.mpId&&DB.mpasses.find(x=>x.id===p.mpId)){
    if(confirm('이 결제를 미납으로 전환할까요?\n\n[확인] 미납 전환 — 수강권은 유지되고, 수강료 탭 미납 목록에 기한(오늘+7일)으로 잡힙니다\n[취소] 전환 안 함 → 완전 삭제 여부를 이어서 물어봅니다')){
      p.status='unpaid'; p.method='-'; p.date=addDays(todayStr,7);
      await saveDB(); toast('미납으로 전환 · 수강권 유지'); render(); return;
    }
  }
  if(!confirm('이 결제 기록을 완전히 삭제할까요?'+(p.mpId?' 연결된 수강권도 함께 삭제됩니다. (잘못 등록한 경우)':''))) return;
  DB.payments=DB.payments.filter(x=>x.id!==id);
  if(p.mpId) DB.mpasses=DB.mpasses.filter(x=>x.id!==p.mpId);
  await saveDB(); toast('결제 기록 삭제'); render(); }
async function doDelPass(id){ const p=DB.mpasses.find(x=>x.id===id); if(!p) return;
  if(!confirm('이 수강권을 삭제할까요? (이미 차감된 출석 기록은 남습니다)')) return;
  DB.mpasses=DB.mpasses.filter(x=>x.id!==id);
  DB.payments.forEach(pay=>{ if(pay.mpId===id) pay.mpId=null; });
  await saveDB(); toast('수강권 삭제'); go('#/member/'+p.memberId); }
async function doAttend(f){ const cid=f.dataset.class; const c=DB.classes.find(x=>x.id===cid); f.querySelectorAll('[data-mid]').forEach(card=>{ const mid=card.dataset.mid; const on=card.querySelector('.chip.att.on'); const result=on?on.dataset.r:'present'; const trial=card.querySelector('.chip.trial').dataset.t==='1'; let deducted=false,pending=false,up=null; if((result==='present'||result==='noshow')&&!trial){ up=classPass(mid,c); if(!up){ const pp=classPendingPass(mid,c); if(pp){ pp.status='active'; pp.start=c.date; pp.expire=addMonths(c.date,pp.months); up=pp; } } if(up){up.remaining--;deducted=true;} else pending=true; } DB.attendance.push({id:uid(),classId:cid,memberId:mid,result,trial,deducted,pending,date:c.date,mpId:(deducted&&up)?up.id:null}); const r=DB.reservations.find(x=>x.classId===cid&&x.memberId===mid&&x.status==='booked'); if(r) r.status='done'; }); await saveDB(); toast('출석 저장 · 자동 차감'); go('#/class/'+cid); }
async function doBook(cid){ const m=curMember(); const c=DB.classes.find(x=>x.id===cid); if(!c) return; if(inBlock(c.date)){ toast('예약 불가 기간입니다'); return; } if(!canUseClass(m.id,c)){ toast('이 수업의 수강권이 없습니다'); return; } const rc=occRes(cid).length; if(rc>=c.capacity){toast('마감');return;} if(occRes(cid).find(r=>r.memberId===m.id)){toast('이미 예약함');return;} DB.reservations.push({id:uid(),classId:cid,memberId:m.id,status:'booked'}); await saveDB(); toast('예약 완료 · 강사 폰에 반영'); go('#/m/reserve'); }
async function doClose(cid,scope){ const c=DB.classes.find(x=>x.id===cid); if(!c) return;
  let targets=[c];
  if(c.seriesId&&scope==='all') targets=DB.classes.filter(x=>x.seriesId===c.seriesId);
  else if(c.seriesId&&scope==='after') targets=DB.classes.filter(x=>x.seriesId===c.seriesId&&x.date>=c.date);
  if(!confirm(`${targets.length}개 수업을 폐강할까요? 예약이 취소됩니다.`)) return;
  const hasAtt=t=>DB.attendance.some(a=>a.classId===t.id);
  const withAtt=targets.filter(hasAtt);
  let delAttToo=false;
  if(withAtt.length){
    delAttToo=confirm(`이 중 ${withAtt.length}개 회차에는 출석 기록이 있습니다.\n\n[확인] 출석 기록까지 삭제하고 차감된 횟수 복구 (잘못 등록한 경우)\n[취소] 출석 기록이 있는 회차는 남기고 나머지만 폐강`);
    if(!delAttToo){ targets=targets.filter(t=>!hasAtt(t)); if(!targets.length){ toast('출석 기록이 있어 폐강하지 않았습니다'); return; } }
  }
  const ids=targets.map(t=>t.id);
  if(delAttToo){
    DB.attendance.filter(a=>ids.includes(a.classId)).forEach(a=>{ if(a.deducted){ const mp=(a.mpId&&DB.mpasses.find(p=>p.id===a.mpId))||DB.mpasses.find(p=>p.memberId===a.memberId&&p.status==='active'); if(mp&&mp.status!=='refunded'&&mp.remaining<mp.total) mp.remaining++; } });
    DB.attendance=DB.attendance.filter(a=>!ids.includes(a.classId));
  }
  DB.reservations.filter(r=>ids.includes(r.classId)&&r.status==='booked').forEach(r=>r.status='cancelled');
  DB.classes=DB.classes.filter(x=>!ids.includes(x.id));
  await saveDB(); toast(`${targets.length}개 폐강${delAttToo?' · 출석 기록 삭제 · 차감 횟수 복구':withAtt.length?` · 출석 있는 ${withAtt.length}개 회차 보존`:''}`); if(location.hash.startsWith('#/classAdd')) render(); else go('#/timetable'); }
async function doUnblock(id){ DB.blocks=(DB.blocks||[]).filter(b=>b.id!==id); await saveDB(); toast('예약 불가 해제 (연장된 유효기간은 유지)'); go('#/blockAdd'); }

// ===== 역할 자동 판별 =====
// 초대 링크(?join=)로 오면 회원, 그 외엔 강사. 저장된 역할 유지.
function detectRole(){
  const u=new URLSearchParams(location.search);
  if(u.get('join')){ localStorage.setItem('role','member'); return 'member'; }
  return localStorage.getItem('role')||'trainer';
}
function initRoute(){
  const role=detectRole();
  const h=location.hash;
  const inMb=h.startsWith('#/m/');
  if(role==='member' && !inMb){ location.hash='#/m/reserve'; }
  else if(role==='trainer' && inMb){ location.hash='#/timetable'; }
  else if(!h){ location.hash = role==='member'?'#/m/reserve':'#/timetable'; }
}
// 개발자용 역할 전환 바 (?dev=1 일 때만 노출 — 실제 강사·회원에겐 안 보임)
function initDevBar(){
  if(new URLSearchParams(location.search).get('dev')!=='1') return;
  const bar=document.getElementById('devbar'); bar.style.display='flex';
  document.getElementById('sw-tr').onclick=()=>{ localStorage.setItem('role','trainer'); location.hash='#/timetable'; };
  document.getElementById('sw-mb').onclick=()=>{ localStorage.setItem('role','member'); location.hash='#/m/reserve'; };
}

(async()=>{ initDevBar(); if(CODE){ await ensureStudio(); subscribe(); initRoute(); } else { ready=true; initRoute(); render(); } })();

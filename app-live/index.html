<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>스튜디오 관리 앱 (실시간)</title>
<link rel="stylesheet" href="../wireframe/css/wire.css">
<style>
  body { background:#e8e8e8; }
  .rolebar { max-width:375px; margin:0 auto; display:flex; gap:6px; padding:8px; background:#333; align-items:center; }
  .rolebar a { flex:1; text-align:center; padding:8px; border-radius:6px; text-decoration:none; font-size:13px; font-weight:700; color:#ccc; background:#444; }
  .rolebar a.on { background:#fff; color:#111; }
  .rolebar .reset { flex:0 0 auto; background:transparent; color:#bbb; font-weight:400; font-size:11px; padding:8px 4px; }
  input.input, select.input, textarea.input { -webkit-appearance:none; appearance:none; background:#fff; font-size:16px; font-family:inherit; }
  .toast { position:fixed; left:50%; bottom:80px; transform:translateX(-50%); background:#111; color:#fff; padding:10px 16px; border-radius:20px; font-size:13px; z-index:99; opacity:0; transition:opacity .2s; max-width:340px; text-align:center; }
  .toast.show { opacity:1; }
  .chip { display:inline-block; font-size:12px; border:1px solid #888; border-radius:14px; padding:5px 10px; margin:2px 2px 2px 0; cursor:pointer; background:#fff; }
  .chip.on { background:#666; color:#fff; border-color:#666; }
  .btn, .chip, .seg a, .tab, .list-item, .classblock, .day { cursor:pointer; }
  .prog { height:14px; border:1px solid #999; border-radius:7px; overflow:hidden; background:#eee; }
  .prog > div { height:100%; background:#888; }
  .empty { border:2px dashed #bbb; border-radius:8px; padding:28px 12px; text-align:center; color:#888; font-size:13px; background:#fcfcfc; }
  .chip.wd { min-width:30px; text-align:center; }
  table.cal { width:100%; border-collapse:collapse; table-layout:fixed; margin:8px 0; }
  table.cal th { font-size:11px; color:#777; padding:4px 0; font-weight:400; }
  table.cal td { border:1px solid #e2e2e2; height:42px; vertical-align:top; font-size:11px; padding:3px 4px; color:#444; cursor:pointer; }
  table.cal td.dim { color:#ccc; background:#fafafa; cursor:default; }
  table.cal td.today { border:2px solid #222; font-weight:800; }
  table.cal td.sel { background:#dcdcdc; }
  table.cal td.blocked { background:repeating-linear-gradient(45deg,#f2f2f2,#f2f2f2 5px,#e0e0e0 5px,#e0e0e0 10px); }
  .hatch { background:repeating-linear-gradient(45deg,#eee,#eee 6px,#ddd 6px,#ddd 12px); border:1px dashed #999; border-radius:6px; padding:8px 10px; font-size:12px; color:#444; margin-bottom:8px; }
  .synced { font-size:10px; color:#8a8; }
  .codebox { font-size:20px; font-weight:800; letter-spacing:3px; text-align:center; background:#f0f0f0; border:1px solid #bbb; border-radius:8px; padding:12px; margin:8px 0; }
  .banner { background:#fffbe6; border:1px solid #e0d48a; border-radius:8px; padding:10px; font-size:12px; margin-bottom:10px; }
</style>
</head>
<body>
<div id="app"><div class="phone"><div class="content"><div class="empty">연결 중…</div></div></div></div>
<div id="devbar" style="display:none;max-width:375px;margin:0 auto;background:#333;padding:6px;gap:6px;justify-content:center;font-size:11px">
  <a id="sw-tr" style="color:#ccc;text-decoration:none;padding:4px 8px;background:#444;border-radius:5px;margin:0 3px">강사 화면</a>
  <a id="sw-mb" style="color:#ccc;text-decoration:none;padding:4px 8px;background:#444;border-radius:5px;margin:0 3px">회원 화면</a>
  <a id="reset" style="color:#bbb;text-decoration:none;padding:4px 8px;margin:0 3px">초기화</a>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

// ===== Firebase config (공개용 식별자) =====
const firebaseConfig = {
  apiKey: "AIzaSyBbQHt5FksViMfgKeo3WwrKqlz7T1NSii8",
  authDomain: "studio-app-81e52.firebaseapp.com",
  projectId: "studio-app-81e52",
  storageBucket: "studio-app-81e52.firebasestorage.app",
  messagingSenderId: "452986965756",
  appId: "1:452986965756:web:d6c663811bde36cde8d179"
};
const fbApp = initializeApp(firebaseConfig);
const fdb = getFirestore(fbApp);

// ===== 스튜디오 코드: 강사·회원이 같은 데이터를 공유하는 열쇠 =====
// URL ?s=CODE 로 참여. 없으면 강사가 새로 만들거나 저장된 코드 사용.
function studioCode(){
  const u=new URLSearchParams(location.search);
  let c=u.get('s')||localStorage.getItem('studioCode');
  if(c){ localStorage.setItem('studioCode',c); }
  return c;
}
function newCode(){ // 6자리 코드
  const s='ABCDEFGHJKMNPQRSTUVWXYZ23456789'; let c=''; for(let i=0;i<6;i++) c+=s[Math.floor(Math.random()*s.length)]; return c;
}
let CODE=studioCode();

const empty=()=>({members:[],passes:[],classes:[],mpasses:[],reservations:[],attendance:[],payments:[],blocks:[]});
let DB=empty();
let ready=false;
// 오늘 날짜 = 기기의 실제 날짜 (하드코딩 금지)
const _now=new Date();
const todayStr=_now.getFullYear()+'-'+String(_now.getMonth()+1).padStart(2,'0')+'-'+String(_now.getDate()).padStart(2,'0');
// 시간표 뷰 상태
let TT={ view: localStorage.getItem('ttView')||'week', ref:todayStr, sel:todayStr };

const won=n=>Number(n||0).toLocaleString('ko-KR');
function uid(){ return Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36); }
function md(iso){ if(!iso) return ''; const p=iso.split('-'); return p[1].replace(/^0/,'')+'/'+p[2].replace(/^0/,''); }
// 날짜 계산은 UTC 기준으로 통일 (지역 시간대에 따른 하루 오차 방지)
function addMonths(iso,m){ const d=new Date(iso+'T00:00:00Z'); d.setUTCMonth(d.getUTCMonth()+Number(m)); return d.toISOString().slice(0,10); }
function addDays(iso,n){ const d=new Date(iso+'T00:00:00Z'); d.setUTCDate(d.getUTCDate()+Number(n)); return d.toISOString().slice(0,10); }
const WD=['일','월','화','수','목','금','토'];
function dow(iso){ return new Date(iso+'T00:00:00Z').getUTCDay(); } // 0=일 … 6=토
function weekStart(iso){ const d=new Date(iso+'T00:00:00Z'); const g=d.getUTCDay(); d.setUTCDate(d.getUTCDate()-g); return d.toISOString().slice(0,10); } // 일요일 시작
function monthKey(iso){ return iso.slice(0,7); }
function daysBetween(a,b){ return Math.round((new Date(b+'T00:00:00Z')-new Date(a+'T00:00:00Z'))/86400000); }
function dateLabel(iso){ return md(iso)+' ('+WD[dow(iso)]+')'; }
function inBlock(iso){ return (DB.blocks||[]).some(b=>iso>=b.start&&iso<=b.end); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ===== Firestore 동기화 =====
async function saveDB(){ if(!CODE) return; try{ await setDoc(doc(fdb,'studios',CODE), DB); }catch(e){ toast('저장 오류: '+e.code); } }
function subscribe(){
  if(!CODE) return;
  onSnapshot(doc(fdb,'studios',CODE), snap=>{
    if(snap.exists()){ DB=Object.assign(empty(),snap.data()); }
    ready=true; render();
  }, err=>{ document.getElementById('app').innerHTML=`<div class="phone"><div class="content"><div class="banner">Firestore 연결 오류: ${err.code}. 테스트 모드로 만들었는지 확인해주세요.</div></div></div>`; });
}
async function ensureStudio(){
  if(!CODE){ return; }
  const ref=doc(fdb,'studios',CODE); const s=await getDoc(ref);
  if(!s.exists()) await setDoc(ref, DB);
}

// ===== 상태 계산 =====
function memberPasses(mid){ return DB.mpasses.filter(p=>p.memberId===mid); }
function memberStatus(mid){
  const ps=memberPasses(mid).filter(p=>p.status!=='refunded');
  const active=ps.find(p=>p.status==='active'&&p.remaining>0&&p.expire>=todayStr);
  if(active){ const soon=active.remaining<=1||active.expire<=addDays(todayStr,7); return soon?'만료 예정':'활성'; }
  if(ps.some(p=>p.status==='pending')) return '개시 대기';
  if(DB.payments.some(p=>p.memberId===mid&&p.status==='unpaid')) return '미납';
  if(ps.length) return '만료';
  return '신규';
}
function usablePass(mid,cat){ return memberPasses(mid).filter(p=>p.status==='active'&&p.remaining>0&&(p.scope==='all'||p.scopeCat===cat)).sort((a,b)=>a.expire<b.expire?-1:1)[0]; }

// ===== 라우팅 =====
function go(h){ location.hash=h; }
window.addEventListener('hashchange',render);
document.getElementById('reset').onclick=()=>{ if(confirm('이 스튜디오의 모든 데이터를 지울까요? (연결된 모든 폰에서 사라집니다)')){ DB=empty(); saveDB(); toast('초기화'); }};

function render(){
  if(!ready){ return; }
  const h=location.hash||'#/home';
  const isMb=h.startsWith('#/m/');
  // 코드 없으면: 강사=코드 생성 화면 / 회원=코드 안내
  if(!CODE){ document.getElementById('app').innerHTML='<div class="phone">'+(isMb?vJoinNeeded():vCreateStudio())+'</div>'; wire(); return; }
  const seg=h.replace('#/','').split('/')[0]; const arg=h.replace('#/','').split('/')[1];
  let html='';
  if(isMb){ const m=curMember(h); const mseg=h.replace('#/m/','').split('/')[0]; const marg=h.replace('#/m/','').split('/')[1]; html=(m&&!m.joined)?vJoinMember():(m?({reserve:mReserve,classdt:mClassReserve,pass:mPass,usage:mUsage,profile:mProfile}[mseg]||mReserve)(m,marg):vJoinMember()); }
  else { html=({home:vHome,passes:vPasses,passAdd:vPassAdd,passEdit:()=>vPassEdit(arg),members:vMembers,memberAdd:vMemberAdd,member:()=>vMemberDetail(arg),timetable:vTimetable,classAdd:vClassAdd,class:()=>vClassDetail(arg),classEdit:()=>vClassEdit(arg),attend:()=>vAttend(arg),payment:()=>vPayment(arg),tuition:vTuition,blockAdd:vBlockAdd}[seg]||vHome)(); }
  document.getElementById('app').innerHTML='<div class="phone">'+html+'</div>'; wire();
}

// ===== 공통 =====
function hdr(title,back){ return `<div class="topbar">${back?`<a class="back" href="${back}">←</a>`:'<div class="back"></div>'}<div class="title">${title}</div><div class="spacer synced">●연동</div></div>`; }
function tabbar(a){ const t=[['home','홈'],['timetable','시간표'],['members','회원'],['tuition','수강료'],['passes','더보기']]; return `<div class="tabbar">${t.map(([k,l])=>`<a class="tab ${a===k?'active':''}" href="#/${k}"><span class="ico"></span>${l}</a>`).join('')}</div>`; }
function mtab(a){ const t=[['reserve','수업 예약'],['pass','수강권'],['usage','이용내역'],['profile','내 정보']]; return `<div class="tabbar">${t.map(([k,l])=>`<a class="tab ${a===k?'active':''}" href="#/m/${k}"><span class="ico"></span>${l}</a>`).join('')}</div>`; }

// ===== 스튜디오 코드 화면 =====
function vCreateStudio(){
  return hdr('스튜디오 만들기')+`<div class="content">
    <div class="banner">처음이시면 스튜디오를 만드세요. 만들어진 <b>초대 링크</b>를 회원에게 카톡으로 보내면, 회원이 가입한 내용이 이 폰에 실시간으로 나타납니다.</div>
    <a class="btn" id="createStudio">＋ 내 스튜디오 만들기</a>
  </div>`;
}
function vJoinNeeded(){
  return hdr('회원')+`<div class="content"><div class="empty">강사에게 받은 <b>초대 링크</b>로 접속해주세요.<br><span style="font-size:11px">링크에 스튜디오 코드가 들어있습니다.</span></div></div>`;
}

// ===== 강사 화면 =====
function vHome(){
  const todays=DB.classes.filter(c=>c.date===todayStr).sort((a,b)=>a.time<b.time?-1:1);
  const unpaid=DB.payments.filter(p=>p.status==='unpaid').length;
  const expSoon=DB.members.filter(m=>memberStatus(m.id)==='만료 예정').length;
  const guide=(DB.passes.length===0||DB.members.length===0||DB.classes.length===0);
  const invite=location.origin+location.pathname+'?s='+CODE+'&join=new';
  return hdr('내 스튜디오')+`<div class="content">
    <div class="banner"><b>공통 초대 링크</b> (단톡방에 뿌리면 여러 명이 각자 가입) · 스튜디오 코드 ${CODE}<div class="codebox" style="font-size:12px;letter-spacing:0;word-break:break-all">${invite}</div><a class="btn ghost" id="copyInvite">공통 초대 링크 복사</a><div class="hint" style="margin-top:6px">특정 회원만 콕 집어 초대하려면 → 회원 탭에서 등록 후 '개별 초대 링크' 사용</div></div>
    <div class="row" style="margin-bottom:12px">
      <a class="card" href="#/tuition" style="text-align:center;margin:0;text-decoration:none;color:#222"><div style="font-size:22px;font-weight:800">${unpaid}</div><div class="sub">미납</div></a>
      <a class="card" href="#/members" style="text-align:center;margin:0;text-decoration:none;color:#222"><div style="font-size:22px;font-weight:800">${expSoon}</div><div class="sub">만료 예정</div></a>
    </div>
    ${guide?`<div class="section-title">시작하기</div>
      <a class="card" href="#/passes" style="display:block;text-decoration:none;color:#222"><b>① 수강권 만들기</b> ${DB.passes.length?'✓':''}</a>
      <a class="card" href="#/members" style="display:block;text-decoration:none;color:#222"><b>② 회원 등록 · 초대</b> ${DB.members.length?'✓':''}</a>
      <a class="card" href="#/timetable" style="display:block;text-decoration:none;color:#222"><b>③ 수업 등록</b> ${DB.classes.length?'✓':''}</a>`:''}
    <div class="section-title">오늘 수업 <span class="sub" style="font-weight:400">${dateLabel(todayStr)}</span></div>
    ${todays.length?todays.map(classBlock).join(''):'<div class="empty">오늘 등록된 수업이 없습니다</div>'}
    <a class="btn" href="#/classAdd" style="margin-top:12px">＋ 수업 등록</a>
  </div>`+tabbar('home');
}
function classBlock(c){ const rc=DB.reservations.filter(r=>r.classId===c.id&&r.status==='booked').length; return `<a class="classblock ${c.category==='personal'?'personal':''}" href="#/class/${c.id}"><span class="t">${c.time}</span> <span class="tag ${c.category==='group'?'dark':''}">${c.category==='group'?'그룹':'개인'}</span><div class="n">${esc(c.name)}</div><div class="meta">예약 ${rc}/${c.capacity}${rc>=c.capacity?' · 마감':' · 잔여 '+(c.capacity-rc)}</div></a>`; }
function vPasses(){ return hdr('수강권 관리','#/home')+`<div class="content">${DB.passes.length?DB.passes.map(p=>`<div class="card"><span style="float:right;font-size:11px"><a href="#/passEdit/${p.id}" style="color:#888;text-decoration:underline">수정</a> · <a data-delproduct="${p.id}" style="color:#888;text-decoration:underline">삭제</a></span><span class="tag ${p.category==='group'?'dark':''}">${p.category==='group'?'그룹':'개인'}</span> <b>${esc(p.name)}</b><div class="note" style="margin:0">${won(p.price)}원 · 유효 ${p.months}개월 · 회당 ${won(Math.round(p.price/p.count))}원 · ${p.scope==='all'?'전체 수업':'특정 수업'}</div></div>`).join(''):'<div class="empty">등록된 수강권이 없습니다</div>'}<a class="btn" href="#/passAdd" style="margin-top:12px">＋ 수강권 추가</a></div>`+tabbar('passes'); }
function vPassEdit(id){ const p=DB.passes.find(x=>x.id===id); if(!p) return vPasses();
  return hdr('수강권 수정','#/passes')+`<div class="content">
  <div class="note">수정 내용은 <b>앞으로의 결제 등록부터</b> 적용됩니다. 이미 판매된 회원 보유분은 구매 당시 조건이 유지됩니다.</div>
  <form id="fpedit" data-id="${id}">
  <div class="field"><label>카테고리</label><div class="seg" id="cat" data-v="${p.category}"><a class="${p.category==='group'?'on':''}" data-v="group">그룹</a><a class="${p.category==='personal'?'on':''}" data-v="personal">개인</a></div></div>
  <div class="field"><label>수강권명 <span class="req">*</span></label><input class="input" name="name" value="${esc(p.name)}" required></div>
  <div class="row"><div class="field"><label>횟수 <span class="req">*</span></label><input class="input" name="count" type="number" inputmode="numeric" min="1" value="${p.count}" required></div><div class="field"><label>유효기간(개월) <span class="req">*</span></label><input class="input" name="months" type="number" inputmode="numeric" min="1" value="${p.months}" required></div></div>
  <div class="field"><label>금액(원) <span class="req">*</span></label><input class="input money" name="price" type="text" inputmode="numeric" value="${won(p.price)}" required></div>
  <button class="btn" type="submit">수정 저장</button>
  <a class="btn ghost" href="#/passes">취소</a></form></div>`+tabbar('passes'); }
function vPassAdd(){ return hdr('수강권 추가','#/passes')+`<div class="content"><form id="f">
  <div class="field"><label>카테고리</label><div class="seg" id="cat" data-v="group"><a class="on" data-v="group">그룹</a><a data-v="personal">개인</a></div></div>
  <div class="field"><label>수강권명 <span class="req">*</span></label><input class="input" name="name" placeholder="예: 그룹 10회권" required></div>
  <div class="row"><div class="field"><label>횟수 <span class="req">*</span></label><input class="input" name="count" type="number" inputmode="numeric" min="1" required></div><div class="field"><label>유효기간(개월) <span class="req">*</span></label><input class="input" name="months" type="number" inputmode="numeric" min="1" required></div></div>
  <div class="field"><label>금액(원) <span class="req">*</span></label><input class="input money" name="price" type="text" inputmode="numeric" placeholder="440,000" required><div class="hint">회원 1인이 결제하는 금액 (예: 10회에 440,000원)</div></div>
  <button class="btn" type="submit">수강권 등록</button></form></div>`+tabbar('passes'); }
function vMembers(){ return hdr('회원','#/home')+`<div class="content"><div style="margin-bottom:8px"><span class="tag dark">전체 ${DB.members.length}</span></div>${DB.members.length?DB.members.map(m=>{const st=memberStatus(m.id);const ap=memberPasses(m.id).find(p=>p.status==='active');return `<a class="list-item" href="#/member/${m.id}"><span class="thumb"></span><span class="grow">${esc(m.name)} <span class="tag ${['미납','만료 예정'].includes(st)?'dark':''}">${st}</span> ${m.joined?'':'<span class="tag">가입대기</span>'}<br><span class="sub">${ap?'잔여 '+ap.remaining+'회/총 '+ap.total+'회':'수강권 없음'}<br>${m.phone}</span></span><span class="arrow">›</span></a>`;}).join(''):'<div class="empty">등록된 회원이 없습니다</div>'}<a class="btn" href="#/memberAdd" style="margin-top:12px">＋ 회원 등록 · 초대</a></div>`+tabbar('members'); }
function vMemberAdd(){ return hdr('회원 등록 · 초대','#/members')+`<div class="content"><div class="note">이름·휴대폰 입력 후 등록하면 초대 링크가 만들어집니다. 그 링크를 카톡으로 회원에게 보내세요.</div><form id="f">
  <div class="field"><label>이름 <span class="req">*</span></label><input class="input" name="name" required></div>
  <div class="field"><label>휴대폰 번호 <span class="req">*</span></label><input class="input" name="phone" inputmode="tel" placeholder="010-1234-5678" required></div>

function ttLabel(){ if(TT.view==='week'){ const ws=weekStart(TT.ref); return md(ws)+' ~ '+md(addDays(ws,6)); } const [y,mo]=monthKey(TT.ref).split('-'); return `${y}년 ${+mo}월`; }
function ttStrip(){
  const ws=weekStart(TT.ref); const days=[]; for(let i=0;i<7;i++) days.push(addDays(ws,i));
  return `<div class="week">${days.map(dt=>`<a class="day ${dt===todayStr?'today':''}">${WD[dow(dt)]}<span class="num">${+dt.slice(8)}</span></a>`).join('')}</div>`;
}
function ttWeekBody(blockFn,blockLabel){
  const ws=weekStart(TT.ref); const days=[]; for(let i=0;i<7;i++) days.push(addDays(ws,i));
  let html=ttStrip();
  (DB.blocks||[]).filter(b=>b.end>=days[0]&&b.start<=days[6]).forEach(b=>{ html+=`<div class="hatch">🚫 ${dateLabel(b.start)} ~ ${dateLabel(b.end)} ${blockLabel}${b.reason?' · '+esc(b.reason):''}</div>`; });
  const withCls=days.filter(dt=>DB.classes.some(c=>c.date===dt));
  if(!withCls.length) return html+'<div class="empty">이번 주 등록된 수업이 없습니다</div>';
  withCls.forEach(dt=>{ const cls=DB.classes.filter(c=>c.date===dt).sort((a,b)=>a.time<b.time?-1:1); html+=`<div class="section-title">${dateLabel(dt)}${dt===todayStr?' · 오늘':''}</div>`+cls.map(blockFn).join(''); });
  return html;
}

function ttMonth(){
  const mk=monthKey(TT.ref); const [y,mo]=mk.split('-').map(Number);
  const firstDow=new Date(`${mk}-01T00:00:00Z`).getUTCDay();
  const dim=new Date(Date.UTC(y,mo,0)).getUTCDate();
  let cells=''; for(let i=0;i<firstDow;i++) cells+='<td class="dim"></td>';
  for(let d=1;d<=dim;d++){ const iso=`${mk}-${String(d).padStart(2,'0')}`; const has=DB.classes.some(c=>c.date===iso); const bl=inBlock(iso); const cl=[bl?'blocked':'',iso===todayStr?'today':'',iso===TT.sel?'sel':''].filter(Boolean).join(' '); cells+=`<td class="${cl}" data-day="${iso}">${d}${has?'<br>●':''}</td>`; if((firstDow+d)%7===0) cells+='</tr><tr>'; }
  const grid=`<table class="cal"><tr><th>일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th></tr><tr>${cells}</tr></table>`;
  const selCls=DB.classes.filter(c=>c.date===TT.sel).sort((a,b)=>a.time<b.time?-1:1);
  const sel=`<div class="section-title">${dateLabel(TT.sel)}${inBlock(TT.sel)?' · 예약 불가':''}</div>`+(selCls.length?selCls.map(classBlock).join(''):'<div class="empty">이 날 수업이 없습니다</div>');
  return `${grid}<div class="note" style="margin-top:-4px">● = 수업 있음 · 빗금 = 예약 불가 · 날짜 탭 → 아래에 표시</div>${sel}`;
}

function memberSwitcher(m){ return `<div class="note">${esc(m.name)}님 화면 · 스튜디오 ${CODE}</div>`; }
function mClassBlock(c,m){ const rc=DB.reservations.filter(r=>r.classId===c.id&&r.status==='booked').length; const mine=DB.reservations.find(r=>r.classId===c.id&&r.memberId===m.id&&r.status==='booked'); const full=rc>=c.capacity; const href=mine?'':' href="#/m/classdt/'+c.id+'"'; const style=mine?' style="border:2px solid #333"':''; return '<a class="classblock '+(c.category==='personal'?'personal':'')+'"'+href+style+'><span class="t">'+c.time+'</span> <span class="tag '+(c.category==='group'?'dark':'')+'">'+(c.category==='group'?'그룹':'개인')+'</span>'+(mine?' <b>✓ 내 예약</b>':'')+'<div class="n">'+esc(c.name)+'</div><div class="meta">예약 '+rc+'/'+c.capacity+(mine?' · 예약 완료':full?' · 마감':' · 예약 가능')+'</div></a>'; }
function mReserve(m){

function mtMonth(m){
  const mk=monthKey(TT.ref); const [y,mo]=mk.split('-').map(Number);
  const firstDow=new Date(`${mk}-01T00:00:00Z`).getUTCDay(); const dim=new Date(Date.UTC(y,mo,0)).getUTCDate();
  let cells=''; for(let i=0;i<firstDow;i++) cells+='<td class="dim"></td>';
  for(let d=1;d<=dim;d++){ const iso=`${mk}-${String(d).padStart(2,'0')}`; const has=DB.classes.some(c=>c.date===iso); const bl=inBlock(iso); const cl=[bl?'blocked':'',iso===todayStr?'today':'',iso===TT.sel?'sel':''].filter(Boolean).join(' '); cells+=`<td class="${cl}" data-day="${iso}">${d}${has?'<br>●':''}</td>`; if((firstDow+d)%7===0) cells+='</tr><tr>'; }
  const grid=`<table class="cal"><tr><th>일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th></tr><tr>${cells}</tr></table>`;
  const selCls=DB.classes.filter(c=>c.date===TT.sel).sort((a,b)=>a.time<b.time?-1:1);
  const sel=`<div class="section-title">${dateLabel(TT.sel)}${inBlock(TT.sel)?' · 휴무':''}</div>`+(selCls.length?selCls.map(c=>mClassBlock(c,m)).join(''):'<div class="empty">이 날 수업이 없습니다</div>');
  return `${grid}<div class="note" style="margin-top:-4px">● = 수업 있음 · 빗금 = 휴무 · 날짜 탭 → 아래에 표시</div>${sel}`;
}
function mClassReserve(m,cid){ const c=DB.classes.find(x=>x.id===cid); if(!c) return mReserve(m); const up=usablePass(m.id,c.category); const rc=DB.reservations.filter(r=>r.classId===c.id&&r.status==='booked').length; const full=rc>=c.capacity; return hdr('수업 상세','#/m/reserve')+`<div class="content"><div class="card"><span class="tag ${c.category==='group'?'dark':''}">${c.category==='group'?'그룹':'개인'}</span><h3 style="font-size:16px;margin:6px 0 2px">${esc(c.name)}</h3><div class="note" style="margin:0">${md(c.date)} ${c.time} · ${esc(c.place||'')}<br>예약 ${rc}/${c.capacity}</div></div><div class="section-title">사용할 수강권</div>${up?`<div class="card" style="border:2px solid #333">◉ <b>${esc(up.name)}</b><div class="note" style="margin:0">잔여 ${up.remaining}회 · 출석 시 1회 차감</div></div>`:'<div class="empty">사용 가능한 수강권이 없습니다. 강사에게 결제를 등록받으세요.</div>'}${full?'<div class="empty">정원 마감</div>':`<a class="btn" data-book="${c.id}">예약하기</a>`}<div class="card" style="padding:10px;margin-top:12px"><div class="note" style="margin:0"><b>취소 정책</b><br>수업 24시간 전까지 취소 시 차감되지 않습니다.</div></div></div>`+mtab('reserve'); }
function mPass(m){ const ps=memberPasses(m.id); return hdr('수강권')+`<div class="content">${memberSwitcher(m)}${ps.length?ps.map(p=>{const used=p.total-p.remaining;const pct=p.total?Math.round(used/p.total*100):0;return `<div class="card"><b>${esc(p.name)}</b> <span class="tag">${p.status==='pending'?'개시 대기':p.status==='active'?'사용 중':'만료'}</span>${p.status==='pending'?'<div class="note" style="margin:6px 0 0">개시 전 — 첫 출석부터 시작</div>':`<div class="note" style="margin:6px 0">잔여 <b>${p.remaining}회</b> / 총 ${p.total}회 · ~${md(p.expire)}</div><div class="prog"><div style="width:${100-pct}%"></div></div>`}</div>`;}).join(''):'<div class="empty">보유한 수강권이 없습니다</div>'}</div>`+mtab('pass'); }

  const cs=document.getElementById('createStudio'); if(cs) cs.onclick=async()=>{ CODE=newCode(); localStorage.setItem('studioCode',CODE); const url=new URL(location.href); url.searchParams.set('s',CODE); history.replaceState(null,'',url); await ensureStudio(); subscribe(); toast('스튜디오 생성: '+CODE); };

  // 수업 등록: 강의 선택 → 직접입력 토글

  if(clsPass&&cb){ const upd=()=>{ cb.style.display = clsPass.value==='custom' ? 'block' : 'none'; }; clsPass.onchange=upd; if(clsPass.value==='custom'||!DB.passes.length){ clsPass.value='custom'; } upd(); }

  document.querySelectorAll('#wdays .chip.wd').forEach(ch=>ch.onclick=()=>ch.classList.toggle('on'));
  const endmode=document.getElementById('endmode');
  if(endmode){ const upd=()=>{ const v=endmode.dataset.v; const cf=document.getElementById('endCountF'), uf=document.getElementById('endUntilF'); if(cf) cf.style.display=v==='count'?'block':'none'; if(uf) uf.style.display=v==='until'?'block':'none'; }; endmode.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>setTimeout(upd,0))); upd(); }
  // 시간표 네비
  const ttseg=document.getElementById('ttseg'); if(ttseg) ttseg.querySelectorAll('a').forEach(a=>a.onclick=()=>{ TT.view=a.dataset.v; localStorage.setItem('ttView',TT.view); render(); });
  const ttPrev=document.getElementById('ttPrev'); if(ttPrev) ttPrev.onclick=()=>{ TT.ref=TT.view==='week'?addDays(TT.ref,-7):addMonths(TT.ref,-1); render(); };
  const ttNext=document.getElementById('ttNext'); if(ttNext) ttNext.onclick=()=>{ TT.ref=TT.view==='week'?addDays(TT.ref,7):addMonths(TT.ref,1); render(); };

  const fblock=document.getElementById('fblock'); if(fblock) fblock.onsubmit=e=>{e.preventDefault();doBlockAdd(fblock);};
  document.querySelectorAll('[data-unblock]').forEach(b=>b.onclick=()=>doUnblock(b.dataset.unblock));
  const fedit=document.getElementById('fedit'); if(fedit) fedit.onsubmit=e=>{e.preventDefault();doClassEdit(fedit);};

async function doBulkAdd(f){
  const txt=(new FormData(f)).get('bulk')||''; const lines=txt.split(/\n/).map(s=>s.trim()).filter(Boolean);
  let n=0,bad=0;
  lines.forEach(l=>{ const parts=l.split(/[,\t]/).map(s=>s.trim()).filter(Boolean); const p2=parts.length>=2?parts:l.split(/\s+/).map(s=>s.trim()).filter(Boolean);
    if(p2.length>=2&&/\d{3,}/.test(p2[1])){ DB.members.push({id:uid(),name:p2[0],phone:p2.slice(1).join('-').replace(/--+/g,'-'),joined:false}); n++; } else bad++; });
  if(!n){ toast('형식을 확인하세요 — 한 줄에 "이름,전화번호"'); return; }
  await saveDB(); toast(`${n}명 일괄 등록 완료${bad?` (${bad}줄 형식 오류 제외)`:''}`); go('#/members');
}
async function doTrainerBook(cid){
  const sel=document.getElementById('bookSel'); if(!sel||!sel.value){ toast('회원을 선택하세요'); return; }
  const mid=sel.value; const c=DB.classes.find(x=>x.id===cid); if(!c) return;
  const scopeSeg=document.getElementById('bookScope'); const scope=scopeSeg?scopeSeg.dataset.v:'one';
  let targets=[c];
  if(scope==='after'&&c.seriesId) targets=DB.classes.filter(x=>x.seriesId===c.seriesId&&x.date>=c.date).sort((a,b)=>a.date<b.date?-1:1);
  let ok=0,full=0,dup=0;
  targets.forEach(t=>{
    if(DB.reservations.find(r=>r.classId===t.id&&r.memberId===mid&&r.status==='booked')){ dup++; return; }
    const rc=DB.reservations.filter(r=>r.classId===t.id&&r.status==='booked').length;
    if(rc>=t.capacity){ full++; return; }
    DB.reservations.push({id:uid(),classId:t.id,memberId:mid,status:'booked'}); ok++;
  });
  if(!ok){ toast(full?'정원 마감으로 추가 불가':'이미 모두 예약된 회원'); return; }
  await saveDB(); toast(`${ok}개 회차 예약 추가${full?` · 마감 ${full}건 제외`:''}${dup?` · 중복 ${dup}건 제외`:''} · 회원 알림(가정)`); render();
}
async function doDelMember(id){
  const m=DB.members.find(x=>x.id===id); if(!m) return;
  const cnt={pass:DB.mpasses.filter(x=>x.memberId===id).length,res:DB.reservations.filter(x=>x.memberId===id).length,att:DB.attendance.filter(x=>x.memberId===id).length,pay:DB.payments.filter(x=>x.memberId===id).length};
  if(!confirm(`'${m.name}' 회원을 삭제할까요?\n연결된 기록도 함께 삭제됩니다 — 수강권 ${cnt.pass} · 예약 ${cnt.res} · 출석 ${cnt.att} · 결제 ${cnt.pay}`)) return;
  DB.members=DB.members.filter(x=>x.id!==id);
  DB.mpasses=DB.mpasses.filter(x=>x.memberId!==id);
  DB.reservations=DB.reservations.filter(x=>x.memberId!==id);
  DB.attendance=DB.attendance.filter(x=>x.memberId!==id);
  DB.payments=DB.payments.filter(x=>x.memberId!==id);
  await saveDB(); toast('회원 삭제 완료'); go('#/members');
}
async function doPassEdit(f){
  const id=f.dataset.id; const p=DB.passes.find(x=>x.id===id); if(!p) return;
  const d=Object.fromEntries(new FormData(f));
  const price=+String(d.price).replace(/[^0-9]/g,'');
  const cat=document.getElementById('cat').dataset.v;
  p.category=cat; p.scopeCat=cat==='group'?'그룹':'개인';
  p.name=d.name; p.count=+d.count; p.months=+d.months; p.price=price;
  await saveDB(); toast('수강권 수정 완료 (기존 판매분은 유지)'); go('#/passes');
}
async function doDelProduct(id){ const p=DB.passes.find(x=>x.id===id); if(!p) return;
  const sold=DB.mpasses.filter(x=>x.passId===id).length;
  const linkedCls=DB.classes.filter(c=>c.passId===id);
  let msg=`'${p.name}' 수강권을 삭제할까요?`;
  if(sold) msg+=`\n· 이미 판매된 ${sold}건(회원 보유분)은 그대로 유지됩니다.`;
  if(!confirm(msg)) return;
  let clsMsg='';
  if(linkedCls.length){
    const rc=DB.reservations.filter(r=>linkedCls.some(c=>c.id===r.classId)&&r.status==='booked').length;
    if(confirm(`시간표에 이 강의로 등록된 수업 ${linkedCls.length}개가 있습니다.\n함께 삭제(폐강)할까요? ${rc?`(예약 ${rc}건도 취소됩니다)`:''}\n\n[확인] = 수업도 함께 삭제 · [취소] = 수업은 시간표에 유지`)){
      const ids=linkedCls.map(c=>c.id);
      DB.reservations.filter(r=>ids.includes(r.classId)&&r.status==='booked').forEach(r=>r.status='cancelled');
      DB.classes=DB.classes.filter(c=>!ids.includes(c.id));
      clsMsg=` · 수업 ${linkedCls.length}개 폐강`;
    }
  }
  DB.passes=DB.passes.filter(x=>x.id!==id);
  await saveDB(); toast('수강권 삭제됨'+clsMsg); render(); }
function copy(t){ navigator.clipboard?.writeText(t).then(()=>toast('복사됨 — 카톡에 붙여넣어 전송하세요'),()=>toast(t)); }
async function handleForm(hash,d){
  if(hash.startsWith('#/passAdd')){ const cat=document.getElementById('cat').dataset.v; const price=+String(d.price).replace(/[^0-9]/g,''); DB.passes.push({id:uid(),category:cat,scope:'all',scopeCat:cat==='group'?'그룹':'개인',name:d.name,count:+d.count,months:+d.months,price}); await saveDB(); toast('수강권 등록'); go('#/passes'); }
  else if(hash.startsWith('#/memberAdd')){ const id=uid(); DB.members.push({id,name:d.name,phone:d.phone,joined:false}); await saveDB(); toast('회원 등록 · 초대 링크 생성'); go('#/member/'+id); }
}
async function doClassAdd(f){
  const d=Object.fromEntries(new FormData(f)); const passId=document.getElementById('clsPass').value;
  let category,name,linkPass=null;
  if(passId==='custom'){ category=document.getElementById('cat').dataset.v; name=(d.cname||'').trim(); if(!name){ toast('수업명을 입력하세요'); return; } }
  else { const p=DB.passes.find(x=>x.id===passId); if(!p){ toast('강의를 선택하세요'); return; } category=p.category; name=p.name; linkPass=p.id; }
  const cap=category==='personal'?1:+d.capacity;
  const repMode=(document.getElementById('rep')||{}).dataset?document.getElementById('rep').dataset.v:'none';
  if(repMode!=='weekly'){
    DB.classes.push({id:uid(),seriesId:null,category,name,date:d.date,time:d.time,capacity:cap,place:d.place,passId:linkPass});
    await saveDB(); toast(inBlock(d.date)?'수업 등록 (주의: 예약 불가 기간)':'수업 등록'); go('#/timetable'); return;
  }
  // 매주 반복 생성
  const wds=[...document.querySelectorAll('#wdays .chip.wd.on')].map(x=>+x.dataset.d);
  if(!wds.length){ toast('반복 요일을 하나 이상 선택하세요'); return; }
  const endMode=document.getElementById('endmode').dataset.v;
  const start=d.date; const seriesId=uid();
  let targetCount=Infinity, stopDate;
  if(endMode==='count'){ targetCount=Math.max(1,+document.getElementById('endCount').value||10); stopDate=addMonths(start,18); }
  else if(endMode==='until'){ stopDate=document.getElementById('endUntil').value; if(!stopDate||stopDate<start){ toast('종료일을 시작일 이후로 지정하세요'); return; } }
  else { stopDate=addMonths(start,3); } // 계속 = 3개월치 미리 생성
  const occ=[]; let cur=start, guard=0;
  while(occ.length<targetCount && cur<=stopDate && guard<800){ if(wds.includes(dow(cur)) && !inBlock(cur)) occ.push(cur); cur=addDays(cur,1); guard++; }
  if(!occ.length){ toast('생성할 회차가 없습니다. 조건을 확인하세요'); return; }
  occ.forEach(dt=>DB.classes.push({id:uid(),seriesId,category,name,date:dt,time:d.time,capacity:cap,place:d.place,passId:linkPass}));
  await saveDB(); toast(`반복 수업 ${occ.length}회 생성 (${md(occ[0])}~${md(occ[occ.length-1])})`); go('#/timetable');
}
async function doBlockAdd(f){
  const d=Object.fromEntries(new FormData(f)); if(d.end<d.start){ toast('종료일이 시작일보다 빠릅니다'); return; }
  const id=uid(); DB.blocks=DB.blocks||[]; DB.blocks.push({id,start:d.start,end:d.end,reason:d.reason||''});
  const bdays=daysBetween(d.start,d.end)+1;
  // 수강권 자동 연장 (기간 겹치는 사용 중 수강권)
  let ext=0; DB.mpasses.forEach(p=>{ if(p.status==='active'&&p.expire&&p.expire>=d.start){ p.expire=addDays(p.expire,bdays); ext++; } });
  // 이 기간의 수업 폐강 + 예약 취소
  const inRange=DB.classes.filter(c=>c.date>=d.start&&c.date<=d.end); const ids=inRange.map(c=>c.id);
  DB.reservations.filter(r=>ids.includes(r.classId)&&r.status==='booked').forEach(r=>r.status='cancelled');
  DB.classes=DB.classes.filter(c=>!ids.includes(c.id));
  await saveDB(); toast(`예약 불가 저장 · 수업 ${inRange.length}건 정리 · 수강권 ${ext}건 +${bdays}일 연장`); go('#/timetable');
}
async function doClassEdit(f){
  const id=f.dataset.id; const c=DB.classes.find(x=>x.id===id); if(!c) return; const d=Object.fromEntries(new FormData(f));
  const scope=(document.getElementById('escope')||{dataset:{v:'one'}}).dataset.v;
  let targets=[c];
  if(c.seriesId&&scope==='all') targets=DB.classes.filter(x=>x.seriesId===c.seriesId);
  else if(c.seriesId&&scope==='after') targets=DB.classes.filter(x=>x.seriesId===c.seriesId&&x.date>=c.date);
  targets.forEach(t=>{ t.time=d.time; t.capacity=+d.capacity; t.place=d.place; });
  await saveDB(); toast(`${targets.length}개 수업 수정 완료`); go('#/class/'+id);
}
async function doJoin(f){ const mid=f.dataset.mid; const d=Object.fromEntries(new FormData(f));
  if(mid==='new'){ const id=uid(); DB.members.push({id,name:d.name,phone:d.phone,birth:d.birth,addr:d.addr,joined:true}); localStorage.setItem('myMemberId',id); await saveDB(); toast('가입 완료! 강사 폰에도 반영됩니다.'); go('#/m/reserve'); return; }
  const m=DB.members.find(x=>x.id===mid); if(m){ m.name=d.name; m.phone=d.phone; m.birth=d.birth; m.addr=d.addr; m.joined=true; localStorage.setItem('myMemberId',mid); await saveDB(); toast('가입 완료! 강사 폰에도 반영됩니다.'); go('#/m/reserve'); } }
async function doPayment(f){ const mid=f.dataset.mid; const d=Object.fromEntries(new FormData(f)); const method=document.getElementById('method').dataset.v; const startMode=document.getElementById('start').dataset.v; const pass=DB.passes.find(p=>p.id===d.passId); if(!pass) return; const unpaid=method==='미납';
  const pay={id:uid(),memberId:mid,passId:pass.id,passName:pass.name,method:unpaid?'-':method,amount:pass.price,date:unpaid?addDays(todayStr,5):todayStr,status:unpaid?'unpaid':'paid',mpId:null};
  if(!unpaid){ const start=startMode==='now'?todayStr:null; const mp={id:uid(),memberId:mid,passId:pass.id,name:pass.name,scope:pass.scope,scopeCat:pass.scopeCat,total:pass.count,remaining:pass.count,status:start?'active':'pending',start:start,expire:start?addMonths(start,pass.months):null,months:pass.months}; const pend=DB.attendance.filter(a=>a.memberId===mid&&a.pending&&!a.trial); if(pend.length){ mp.status='active'; mp.start=pend[0].date; mp.expire=addMonths(pend[0].date,pass.months); pend.forEach(a=>{ if(mp.remaining>0){mp.remaining--; a.deducted=true; a.pending=false;} }); } DB.mpasses.push(mp); pay.mpId=mp.id; DB.payments.push(pay); await saveDB(); toast(pend.length?`납부 완료 · 출석 ${pend.length}건 소급 차감 → 잔여 ${mp.remaining}회`:'납부 완료 · 수강권 발급'); }
  else { DB.payments.push(pay); await saveDB(); toast('미납 등록'); }
  go('#/member/'+mid);
}
async function doDelPay(id){ const p=DB.payments.find(x=>x.id===id); if(!p) return;
  if(!confirm('이 결제 기록을 삭제할까요?'+(p.mpId?' 연결된 수강권도 함께 삭제됩니다.':''))) return;
  DB.payments=DB.payments.filter(x=>x.id!==id);
  if(p.mpId) DB.mpasses=DB.mpasses.filter(x=>x.id!==p.mpId);
  await saveDB(); toast('결제 기록 삭제'); go('#/member/'+p.memberId); }
async function doDelPass(id){ const p=DB.mpasses.find(x=>x.id===id); if(!p) return;
  if(!confirm('이 수강권을 삭제할까요? (이미 차감된 출석 기록은 남습니다)')) return;
  DB.mpasses=DB.mpasses.filter(x=>x.id!==id);
  DB.payments.forEach(pay=>{ if(pay.mpId===id) pay.mpId=null; });
  await saveDB(); toast('수강권 삭제'); go('#/member/'+p.memberId); }
async function doAttend(f){ const cid=f.dataset.class; const c=DB.classes.find(x=>x.id===cid); f.querySelectorAll('[data-mid]').forEach(card=>{ const mid=card.dataset.mid; const on=card.querySelector('.chip.att.on'); const result=on?on.dataset.r:'present'; const trial=card.querySelector('.chip.trial').dataset.t==='1'; let deducted=false,pending=false; if((result==='present'||result==='noshow')&&!trial){ const up=usablePass(mid,c.category); if(up){up.remaining--;deducted=true;} else pending=true; } DB.attendance.push({id:uid(),classId:cid,memberId:mid,result,trial,deducted,pending,date:c.date}); const r=DB.reservations.find(x=>x.classId===cid&&x.memberId===mid&&x.status==='booked'); if(r) r.status='done'; }); await saveDB(); toast('출석 저장 · 자동 차감'); go('#/class/'+cid); }
async function doBook(cid){ const m=curMember(); const c=DB.classes.find(x=>x.id===cid); if(!c) return; if(inBlock(c.date)){ toast('예약 불가 기간입니다'); return; } const rc=DB.reservations.filter(r=>r.classId===cid&&r.status==='booked').length; if(rc>=c.capacity){toast('마감');return;} if(DB.reservations.find(r=>r.classId===cid&&r.memberId===m.id&&r.status==='booked')){toast('이미 예약함');return;} DB.reservations.push({id:uid(),classId:cid,memberId:m.id,status:'booked'}); await saveDB(); toast('예약 완료 · 강사 폰에 반영'); go('#/m/reserve'); }
async function doClose(cid,scope){ const c=DB.classes.find(x=>x.id===cid); if(!c) return;
  let targets=[c];
  if(c.seriesId&&scope==='all') targets=DB.classes.filter(x=>x.seriesId===c.seriesId);
  else if(c.seriesId&&scope==='after') targets=DB.classes.filter(x=>x.seriesId===c.seriesId&&x.date>=c.date);
  if(!confirm(`${targets.length}개 수업을 폐강할까요? 예약이 취소됩니다.`)) return;
  const ids=targets.map(t=>t.id);
  DB.reservations.filter(r=>ids.includes(r.classId)&&r.status==='booked').forEach(r=>r.status='cancelled');
  DB.classes=DB.classes.filter(x=>!ids.includes(x.id));
  await saveDB(); toast(`${targets.length}개 폐강`); go('#/timetable'); }
async function doUnblock(id){ DB.blocks=(DB.blocks||[]).filter(b=>b.id!==id); await saveDB(); toast('예약 불가 해제 (연장된 유효기간은 유지)'); go('#/blockAdd'); }

// ===== 역할 자동 판별 =====
// 초대 링크(?join=)로 오면 회원, 그 외엔 강사. 저장된 역할 유지.
function detectRole(){
  const u=new URLSearchParams(location.search);
  if(u.get('join')){ localStorage.setItem('role','member'); return 'member'; }
  return localStorage.getItem('role')||'trainer';
}
function initRoute(){
  const role=detectRole();
  const h=location.hash;
  const inMb=h.startsWith('#/m/');
  if(role==='member' && !inMb){ location.hash='#/m/reserve'; }
  else if(role==='trainer' && inMb){ location.hash='#/home'; }
  else if(!h){ location.hash = role==='member'?'#/m/reserve':'#/home'; }
}
// 개발자용 역할 전환 바 (?dev=1 일 때만 노출 — 실제 강사·회원에겐 안 보임)
function initDevBar(){
  if(new URLSearchParams(location.search).get('dev')!=='1') return;
  const bar=document.getElementById('devbar'); bar.style.display='flex';
  document.getElementById('sw-tr').onclick=()=>{ localStorage.setItem('role','trainer'); location.hash='#/home'; };
  document.getElementById('sw-mb').onclick=()=>{ localStorage.setItem('role','member'); location.hash='#/m/reserve'; };
}

// ===== 시작 =====
window.curMember=curMember; // for doBook
(async()=>{ initDevBar(); if(CODE){ await ensureStudio(); subscribe(); initRoute(); } else { ready=true; initRoute(); render(); } })();
